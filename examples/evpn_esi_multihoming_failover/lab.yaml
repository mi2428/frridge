apiVersion: frridge/v1alpha1

lab:
  name: evpn-esi-multihoming-failover
  workdir: .frridge

routers:
  rr:
    loopbacks:
      - 10.255.81.100/32
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname rr
          router bgp 65000
           bgp router-id 10.255.81.100
           bgp cluster-id 10.255.81.100
           bgp retain route-target all
           no bgp default ipv4-unicast
           neighbor 10.0.81.0 remote-as 65000
           neighbor 10.0.81.2 remote-as 65000
           neighbor 10.0.81.4 remote-as 65000
           address-family ipv4 unicast
            network 10.255.81.100/32
            neighbor 10.0.81.0 activate
            neighbor 10.0.81.0 route-reflector-client
            neighbor 10.0.81.0 next-hop-self force
            neighbor 10.0.81.2 activate
            neighbor 10.0.81.2 route-reflector-client
            neighbor 10.0.81.2 next-hop-self force
            neighbor 10.0.81.4 activate
            neighbor 10.0.81.4 route-reflector-client
            neighbor 10.0.81.4 next-hop-self force
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.81.0 activate
            neighbor 10.0.81.0 route-reflector-client
            neighbor 10.0.81.2 activate
            neighbor 10.0.81.2 route-reflector-client
            neighbor 10.0.81.4 activate
            neighbor 10.0.81.4 route-reflector-client
           exit-address-family
          end

  pe1:
    loopbacks:
      - 10.255.81.11/32
    linux:
      bonds:
        - name: bond0
          mode: active-backup
          interfaces: [eth2]
      bridges:
        - name: br10
          interfaces: [bond0]
          vxlans:
            - name: vxlan100
              vni: 100
              local: 10.255.81.11
              nolearning: true
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname pe1
          router bgp 65000
           bgp router-id 10.255.81.11
           no bgp default ipv4-unicast
           neighbor 10.0.81.1 remote-as 65000
           address-family ipv4 unicast
            network 10.255.81.11/32
            neighbor 10.0.81.1 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.81.1 activate
            advertise-all-vni
           exit-address-family
          exit
          interface bond0
           evpn mh es-id 1
           evpn mh es-sys-mac 02:00:00:00:81:aa
           evpn mh es-df-pref 200
          end

  pe2:
    loopbacks:
      - 10.255.81.12/32
    linux:
      bonds:
        - name: bond0
          mode: active-backup
          interfaces: [eth2]
      bridges:
        - name: br10
          interfaces: [bond0]
          vxlans:
            - name: vxlan100
              vni: 100
              local: 10.255.81.12
              nolearning: true
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname pe2
          router bgp 65000
           bgp router-id 10.255.81.12
           no bgp default ipv4-unicast
           neighbor 10.0.81.3 remote-as 65000
           address-family ipv4 unicast
            network 10.255.81.12/32
            neighbor 10.0.81.3 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.81.3 activate
            advertise-all-vni
           exit-address-family
          exit
          interface bond0
           evpn mh es-id 1
           evpn mh es-sys-mac 02:00:00:00:81:aa
           evpn mh es-df-pref 100
          end

  pe3:
    loopbacks:
      - 10.255.81.13/32
    linux:
      bridges:
        - name: br10
          vxlans:
            - name: vxlan100
              vni: 100
              local: 10.255.81.13
              nolearning: true
          namespaces:
            - name: host
              ifname: eth0
              mac: 02:00:00:00:81:13
              addresses: [10.10.81.13/24]
    commands:
      - kind: shell
        run: ip netns exec host ping -c 1 -W 1 10.10.81.254 >/dev/null 2>&1 || true
      - kind: vtysh
        run: |
          configure terminal
          hostname pe3
          router bgp 65000
           bgp router-id 10.255.81.13
           no bgp default ipv4-unicast
           neighbor 10.0.81.5 remote-as 65000
           address-family ipv4 unicast
            network 10.255.81.13/32
            neighbor 10.0.81.5 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.81.5 activate
            advertise-all-vni
           exit-address-family
          end

  srv:
    linux:
      bonds:
        - name: bond0
          mode: active-backup
          mac: 02:00:00:00:81:11
          addresses: [10.10.81.11/24]
          interfaces: [eth1, eth2]

links:
  - name: rr-pe1
    type: p2p
    members:
      - router: pe1
        ifname: eth1
        ipv4: 10.0.81.0/31
      - router: rr
        ifname: eth1
        ipv4: 10.0.81.1/31

  - name: rr-pe2
    type: p2p
    members:
      - router: pe2
        ifname: eth1
        ipv4: 10.0.81.2/31
      - router: rr
        ifname: eth2
        ipv4: 10.0.81.3/31

  - name: rr-pe3
    type: p2p
    members:
      - router: pe3
        ifname: eth1
        ipv4: 10.0.81.4/31
      - router: rr
        ifname: eth3
        ipv4: 10.0.81.5/31

  - name: pe1-srv
    type: p2p
    members:
      - router: pe1
        ifname: eth2
      - router: srv
        ifname: eth1

  - name: pe2-srv
    type: p2p
    members:
      - router: pe2
        ifname: eth2
      - router: srv
        ifname: eth2

pings:
  - name: multihomed-server-to-remote-vtep
    from:
      router: srv
      address: 10.10.81.11
    to: 10.10.81.13
    count: 5
