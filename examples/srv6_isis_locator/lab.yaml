apiVersion: frridge/v1alpha1

lab:
  name: srv6-isis-locator
  workdir: .frridge
  defaults:
    sysctls:
      net.ipv6.conf.all.forwarding: "1"

routers:
  r1:
    loopbacks:
      - 2001:db8:84::1/128
    commands:
      - kind: shell
        run: |
          set -e
          ip -6 addr replace 2001:db8:84:12::1/127 dev eth1
          ip link add sr0 type dummy
          ip link set sr0 up
          ip -6 addr replace 2001:db8:84:100::1/128 dev sr0
      - kind: vtysh
        run: |
          configure terminal
          hostname r1
          segment-routing
           srv6
            encapsulation
             source-address 2001:db8:84::1
            exit
            locators
             locator loc1
              prefix fd00:84:1::/64 block-len 48 node-len 16
              format uncompressed-f4024
           exit
           exit
           exit
          router isis CORE
           net 49.0001.0000.0000.8401.00
           is-type level-2-only
           metric-style wide
           topology ipv6-unicast
          exit
          interface lo
           ip router isis CORE
           ipv6 router isis CORE
           isis passive
          exit
          interface eth1
           ip router isis CORE
           ipv6 router isis CORE
           isis network point-to-point
          exit
          end
      - kind: shell
        run: |
          set -e
          (
            sleep 35
            printf '%s\n' \
              'configure terminal' \
              'router isis CORE' \
              ' no segment-routing srv6' \
              ' segment-routing srv6' \
              '  locator loc1' \
              'end' \
              'write memory' | vtysh
          ) >/tmp/srv6-isis-rearm.log 2>&1 &

  r2:
    loopbacks:
      - 2001:db8:84::2/128
    commands:
      - kind: shell
        run: |
          set -e
          ip -6 addr replace 2001:db8:84:12::0/127 dev eth1
          ip -6 addr replace 2001:db8:84:23::0/127 dev eth2
          ip link add sr0 type dummy
          ip link set sr0 up
          ip -6 addr replace 2001:db8:84:100::2/128 dev sr0
      - kind: vtysh
        run: |
          configure terminal
          hostname r2
          segment-routing
           srv6
            encapsulation
             source-address 2001:db8:84::2
            exit
            locators
             locator loc1
              prefix fd00:84:2::/64 block-len 48 node-len 16
              format uncompressed-f4024
           exit
           exit
           exit
          router isis CORE
           net 49.0001.0000.0000.8402.00
           is-type level-2-only
           metric-style wide
           topology ipv6-unicast
          exit
          interface lo
           ip router isis CORE
           ipv6 router isis CORE
           isis passive
          exit
          interface eth1
           ip router isis CORE
           ipv6 router isis CORE
           isis network point-to-point
          exit
          interface eth2
           ip router isis CORE
           ipv6 router isis CORE
           isis network point-to-point
          exit
          end
      - kind: shell
        run: |
          set -e
          (
            sleep 35
            printf '%s\n' \
              'configure terminal' \
              'router isis CORE' \
              ' no segment-routing srv6' \
              ' segment-routing srv6' \
              '  locator loc1' \
              'end' \
              'write memory' | vtysh
          ) >/tmp/srv6-isis-rearm.log 2>&1 &

  r3:
    loopbacks:
      - 2001:db8:84::3/128
    commands:
      - kind: shell
        run: |
          set -e
          ip -6 addr replace 2001:db8:84:23::1/127 dev eth1
          ip link add sr0 type dummy
          ip link set sr0 up
          ip -6 addr replace 2001:db8:84:100::3/128 dev sr0
      - kind: vtysh
        run: |
          configure terminal
          hostname r3
          segment-routing
           srv6
            encapsulation
             source-address 2001:db8:84::3
            exit
            locators
             locator loc1
              prefix fd00:84:3::/64 block-len 48 node-len 16
              format uncompressed-f4024
           exit
           exit
           exit
          router isis CORE
           net 49.0001.0000.0000.8403.00
           is-type level-2-only
           metric-style wide
           topology ipv6-unicast
          exit
          interface lo
           ip router isis CORE
           ipv6 router isis CORE
           isis passive
          exit
          interface eth1
           ip router isis CORE
           ipv6 router isis CORE
           isis network point-to-point
          exit
          end
      - kind: shell
        run: |
          set -e
          (
            sleep 35
            printf '%s\n' \
              'configure terminal' \
              'router isis CORE' \
              ' no segment-routing srv6' \
              ' segment-routing srv6' \
              '  locator loc1' \
              'end' \
              'write memory' | vtysh
          ) >/tmp/srv6-isis-rearm.log 2>&1 &
      - kind: shell
        run: |
          set -e
          sleep 50

links:
  - name: r1-r2
    type: p2p
    members:
      - { router: r1, ifname: eth1 }
      - { router: r2, ifname: eth1 }

  - name: r2-r3
    type: p2p
    members:
      - { router: r2, ifname: eth2 }
      - { router: r3, ifname: eth1 }

pings:
  - name: r1-to-r3-loopback
    from:
      router: r1
    to: 2001:db8:84::3
