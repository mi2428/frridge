apiVersion: frridge/v1alpha1

lab:
  name: evpn-type1-simple
  workdir: .frridge

routers:
  rr:
    loopbacks:
      - 10.255.81.100/32
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname rr
          router bgp 65000
           bgp router-id 10.255.81.100
           bgp cluster-id 10.255.81.100
           bgp retain route-target all
           no bgp default ipv4-unicast
           neighbor 10.0.81.0 remote-as 65000
           neighbor 10.0.81.2 remote-as 65000
           address-family ipv4 unicast
            network 10.255.81.100/32
            neighbor 10.0.81.0 activate
            neighbor 10.0.81.0 route-reflector-client
            neighbor 10.0.81.0 next-hop-self force
            neighbor 10.0.81.2 activate
            neighbor 10.0.81.2 route-reflector-client
            neighbor 10.0.81.2 next-hop-self force
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.81.0 activate
            neighbor 10.0.81.0 route-reflector-client
            neighbor 10.0.81.2 activate
            neighbor 10.0.81.2 route-reflector-client
           exit-address-family
          end

  pe1:
    loopbacks:
      - 10.255.81.11/32
    linux:
      bonds:
        - name: bond0
          mode: active-backup
          interfaces: [eth2]
      bridges:
        - name: br10
          interfaces: [bond0]
          vxlans:
            - name: vxlan100
              vni: 100
              local: 10.255.81.11
              nolearning: true
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname pe1
          router bgp 65000
           bgp router-id 10.255.81.11
           no bgp default ipv4-unicast
           neighbor 10.0.81.1 remote-as 65000
           address-family ipv4 unicast
            network 10.255.81.11/32
            neighbor 10.0.81.1 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.81.1 activate
            advertise-all-vni
           exit-address-family
          exit
          interface bond0
           evpn mh es-id 1
           evpn mh es-sys-mac 02:00:00:00:81:aa
           evpn mh es-df-pref 200
          end

  pe2:
    loopbacks:
      - 10.255.81.12/32
    linux:
      bonds:
        - name: bond0
          mode: active-backup
          interfaces: [eth2]
      bridges:
        - name: br10
          interfaces: [bond0]
          vxlans:
            - name: vxlan100
              vni: 100
              local: 10.255.81.12
              nolearning: true
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname pe2
          router bgp 65000
           bgp router-id 10.255.81.12
           no bgp default ipv4-unicast
           neighbor 10.0.81.3 remote-as 65000
           address-family ipv4 unicast
            network 10.255.81.12/32
            neighbor 10.0.81.3 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.81.3 activate
            advertise-all-vni
           exit-address-family
          exit
          interface bond0
           evpn mh es-id 1
           evpn mh es-sys-mac 02:00:00:00:81:aa
           evpn mh es-df-pref 100
          end

  srv: {}

links:
  - name: rr-pe1
    type: p2p
    members:
      - router: pe1
        ifname: eth1
        ipv4: 10.0.81.0/31
      - router: rr
        ifname: eth1
        ipv4: 10.0.81.1/31

  - name: rr-pe2
    type: p2p
    members:
      - router: pe2
        ifname: eth1
        ipv4: 10.0.81.2/31
      - router: rr
        ifname: eth2
        ipv4: 10.0.81.3/31

  - name: access
    type: bridge
    members:
      - router: pe1
        ifname: eth2
      - router: pe2
        ifname: eth2
      - router: srv
        ifname: eth1
