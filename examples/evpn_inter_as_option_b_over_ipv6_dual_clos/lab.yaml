        run: |
          configure terminal
          hostname rsp2
          router bgp 65002
           bgp router-id 10.255.194.2
           bgp cluster-id 10.255.194.2
           bgp retain route-target all
           no bgp default ipv4-unicast
           neighbor 2001:db8:193:24::0 remote-as 65002
           neighbor 2001:db8:193:25::0 remote-as 65002
           neighbor 2001:db8:193:26::0 remote-as 65002
           address-family ipv6 unicast
            network 2001:db8:193:2::2/128
            neighbor 2001:db8:193:24::0 activate
            neighbor 2001:db8:193:24::0 route-reflector-client
            neighbor 2001:db8:193:24::0 next-hop-self force
            neighbor 2001:db8:193:25::0 activate
            neighbor 2001:db8:193:25::0 route-reflector-client
            neighbor 2001:db8:193:25::0 next-hop-self force
            neighbor 2001:db8:193:26::0 activate
            neighbor 2001:db8:193:26::0 route-reflector-client
            neighbor 2001:db8:193:26::0 next-hop-self force
           exit-address-family
           address-family l2vpn evpn
            neighbor 2001:db8:193:24::0 activate
            neighbor 2001:db8:193:24::0 route-reflector-client
            neighbor 2001:db8:193:25::0 activate
            neighbor 2001:db8:193:25::0 route-reflector-client
            neighbor 2001:db8:193:26::0 activate
            neighbor 2001:db8:193:26::0 route-reflector-client
           exit-address-family
          end
      - kind: shell
        run: |
          set -e
          sleep 10

links:
  - name: llf1-lsp1
    type: p2p
    members:
      - { router: llf1, ifname: eth1 }
      - { router: lsp1, ifname: eth1 }

  - name: llf2-lsp1
    type: p2p
    members:
      - { router: llf2, ifname: eth1 }
      - { router: lsp1, ifname: eth2 }

  - name: llf3-lsp1
    type: p2p
    members:
      - { router: llf3, ifname: eth1 }
      - { router: lsp1, ifname: eth3 }

  - name: llf1-lsp2
    type: p2p
    members:
      - { router: llf1, ifname: eth2 }
      - { router: lsp2, ifname: eth1 }

  - name: llf2-lsp2
    type: p2p
    members:
      - { router: llf2, ifname: eth2 }
      - { router: lsp2, ifname: eth2 }

  - name: llf3-lsp2
    type: p2p
    members:
      - { router: llf3, ifname: eth2 }
      - { router: lsp2, ifname: eth3 }

  - name: rlf1-rsp1
    type: p2p
    members:
      - { router: rlf1, ifname: eth1 }
      - { router: rsp1, ifname: eth1 }

  - name: rlf2-rsp1
    type: p2p
    members:
      - { router: rlf2, ifname: eth1 }
      - { router: rsp1, ifname: eth2 }

  - name: rlf3-rsp1
    type: p2p
    members:
      - { router: rlf3, ifname: eth1 }
      - { router: rsp1, ifname: eth3 }

  - name: rlf1-rsp2
    type: p2p
    members:
      - { router: rlf1, ifname: eth2 }
      - { router: rsp2, ifname: eth1 }

  - name: rlf2-rsp2
    type: p2p
    members:
      - { router: rlf2, ifname: eth2 }
      - { router: rsp2, ifname: eth2 }

  - name: rlf3-rsp2
    type: p2p
    members:
      - { router: rlf3, ifname: eth2 }
      - { router: rsp2, ifname: eth3 }

  - name: left-right-border
    type: p2p
    members:
      - { router: llf3, ifname: eth3 }
      - { router: rlf3, ifname: eth3 }

pings:
  - name: llf1-host-to-rlf1-host
    from:
      router: llf1
      namespace: host
    to: 10.10.193.21

  - name: llf2-host-to-rlf2-host
    from:
      router: llf2
      namespace: host
    to: 10.10.193.22
