apiVersion: frridge/v1alpha1

lab:
  name: ebgp-inter-as-c
  workdir: .frridge

routers:
  as1:
    loopbacks:
      - 10.255.2.1/32
    linux:
      routes:
        - to: 10.255.2.2/32
          via: 192.0.2.1
          dev: eth1
      bridges:
        - name: br10
          addresses: [10.10.30.1/24]
          namespaces:
            - name: host
              ifname: eth0
              mac: 02:00:00:00:c0:11
              addresses: [10.10.30.11/24]
              defaultVia: 10.10.30.1
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname as1
          router bgp 65001
           bgp router-id 10.255.2.1
           neighbor 10.255.2.2 remote-as 65002
           neighbor 10.255.2.2 update-source lo
           neighbor 10.255.2.2 ebgp-multihop 5
           address-family ipv4 unicast
            network 10.255.2.1/32
            network 10.10.30.0/24
            neighbor 10.255.2.2 activate
           exit-address-family
          end

  as2:
    loopbacks:
      - 10.255.2.2/32
    linux:
      routes:
        - to: 10.255.2.1/32
          via: 192.0.2.0
          dev: eth1
      bridges:
        - name: br20
          addresses: [10.20.30.1/24]
          namespaces:
            - name: host
              ifname: eth0
              mac: 02:00:00:00:c0:12
              addresses: [10.20.30.12/24]
              defaultVia: 10.20.30.1
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname as2
          router bgp 65002
           bgp router-id 10.255.2.2
           neighbor 10.255.2.1 remote-as 65001
           neighbor 10.255.2.1 update-source lo
           neighbor 10.255.2.1 ebgp-multihop 5
           address-family ipv4 unicast
            network 10.255.2.2/32
            network 10.20.30.0/24
            neighbor 10.255.2.1 activate
           exit-address-family
          end

links:
  - name: transport
    type: p2p
    members:
      - router: as1
        ifname: eth1
        ipv4: 192.0.2.0/31
      - router: as2
        ifname: eth1
        ipv4: 192.0.2.1/31

pings:
  - name: as1-host-to-as2-host
    from:
      router: as1
      namespace: host
    to: 10.20.30.12
