apiVersion: frridge/v1alpha1

lab:
  name: evpn-svd-vlan-aware-bridge
  workdir: .frridge

routers:
  rr:
    loopbacks:
      - 10.255.82.100/32
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname rr
          router bgp 65000
           bgp router-id 10.255.82.100
           bgp cluster-id 10.255.82.100
           bgp retain route-target all
           no bgp default ipv4-unicast
           neighbor 10.0.82.0 remote-as 65000
           neighbor 10.0.82.2 remote-as 65000
           address-family ipv4 unicast
            network 10.255.82.100/32
            neighbor 10.0.82.0 activate
            neighbor 10.0.82.0 route-reflector-client
            neighbor 10.0.82.0 next-hop-self force
            neighbor 10.0.82.2 activate
            neighbor 10.0.82.2 route-reflector-client
            neighbor 10.0.82.2 next-hop-self force
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.82.0 activate
            neighbor 10.0.82.0 route-reflector-client
            neighbor 10.0.82.2 activate
            neighbor 10.0.82.2 route-reflector-client
           exit-address-family
          end

  pe1:
    loopbacks:
      - 10.255.82.11/32
    commands:
      - kind: shell
        run: |
          set -e
          ip link add br0 type bridge vlan_filtering 1 vlan_default_pvid 0
          ip link set br0 addrgenmode none
          ip link set br0 up
          ip link add vxlan0 type vxlan local 10.255.82.11 dstport 4789 nolearning external vnifilter
          ip link set vxlan0 addrgenmode none
          ip link set vxlan0 master br0
          ip link set vxlan0 up
          bridge link set dev vxlan0 vlan_tunnel on
          bridge link set dev vxlan0 learning off neigh_suppress on
          bridge vlan add dev br0 vid 10 self
          bridge vlan add dev br0 vid 20 self
          bridge vlan add dev vxlan0 vid 10
          bridge vlan add dev vxlan0 vid 10 tunnel_info id 110
          bridge vlan add dev vxlan0 vid 20
          bridge vlan add dev vxlan0 vid 20 tunnel_info id 220
          bridge vni add dev vxlan0 vni 110
          bridge vni add dev vxlan0 vni 220
          ip link add vlan10 link br0 type vlan id 10
          ip link set vlan10 address 02:00:00:00:82:10 addrgenmode none
          sysctl -w net.ipv4.conf.vlan10.forwarding=0
          sysctl -w net.ipv6.conf.vlan10.forwarding=0
          ip link set vlan10 up
          ip link add vlan20 link br0 type vlan id 20
          ip link set vlan20 address 02:00:00:00:82:20 addrgenmode none
          sysctl -w net.ipv4.conf.vlan20.forwarding=0
          sysctl -w net.ipv6.conf.vlan20.forwarding=0
          ip link set vlan20 up
          ip link add access10 type veth peer name host10
          ip link set access10 master br0
          bridge vlan add dev access10 vid 10 pvid untagged
          ip link set access10 up
          ip netns add host10
          ip link set host10 netns host10
          ip netns exec host10 ip link set lo up
          ip netns exec host10 ip link set host10 name eth0
          ip netns exec host10 ip link set eth0 address 02:00:00:00:82:11
          ip netns exec host10 ip addr add 10.10.82.11/24 dev eth0
          ip netns exec host10 ip link set eth0 up
          ip link add access20 type veth peer name host20
          ip link set access20 master br0
          bridge vlan add dev access20 vid 20 pvid untagged
          ip link set access20 up
          ip netns add host20
          ip link set host20 netns host20
          ip netns exec host20 ip link set lo up
          ip netns exec host20 ip link set host20 name eth0
          ip netns exec host20 ip link set eth0 address 02:00:00:00:82:21
          ip netns exec host20 ip addr add 10.20.82.11/24 dev eth0
          ip netns exec host20 ip link set eth0 up
      - kind: vtysh
        run: |
          configure terminal
          hostname pe1
          router bgp 65000
           bgp router-id 10.255.82.11
           no bgp default ipv4-unicast
           neighbor 10.0.82.1 remote-as 65000
           address-family ipv4 unicast
            network 10.255.82.11/32
            neighbor 10.0.82.1 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.82.1 activate
            advertise-all-vni
           exit-address-family
          end

  pe2:
    loopbacks:
      - 10.255.82.12/32
    commands:
      - kind: shell
        run: |
          set -e
          ip link add br0 type bridge vlan_filtering 1 vlan_default_pvid 0
          ip link set br0 addrgenmode none
          ip link set br0 up
          ip link add vxlan0 type vxlan local 10.255.82.12 dstport 4789 nolearning external vnifilter
          ip link set vxlan0 addrgenmode none
          ip link set vxlan0 master br0
          ip link set vxlan0 up
          bridge link set dev vxlan0 vlan_tunnel on
          bridge link set dev vxlan0 learning off neigh_suppress on
          bridge vlan add dev br0 vid 10 self
          bridge vlan add dev br0 vid 20 self
          bridge vlan add dev vxlan0 vid 10
          bridge vlan add dev vxlan0 vid 10 tunnel_info id 110
          bridge vlan add dev vxlan0 vid 20
          bridge vlan add dev vxlan0 vid 20 tunnel_info id 220
          bridge vni add dev vxlan0 vni 110
          bridge vni add dev vxlan0 vni 220
          ip link add vlan10 link br0 type vlan id 10
          ip link set vlan10 address 02:00:00:00:82:30 addrgenmode none
          sysctl -w net.ipv4.conf.vlan10.forwarding=0
          sysctl -w net.ipv6.conf.vlan10.forwarding=0
          ip link set vlan10 up
          ip link add vlan20 link br0 type vlan id 20
          ip link set vlan20 address 02:00:00:00:82:40 addrgenmode none
          sysctl -w net.ipv4.conf.vlan20.forwarding=0
          sysctl -w net.ipv6.conf.vlan20.forwarding=0
          ip link set vlan20 up
          ip link add access10 type veth peer name host10
          ip link set access10 master br0
          bridge vlan add dev access10 vid 10 pvid untagged
          ip link set access10 up
          ip netns add host10
          ip link set host10 netns host10
          ip netns exec host10 ip link set lo up
          ip netns exec host10 ip link set host10 name eth0
          ip netns exec host10 ip link set eth0 address 02:00:00:00:82:12
          ip netns exec host10 ip addr add 10.10.82.12/24 dev eth0
          ip netns exec host10 ip link set eth0 up
          ip link add access20 type veth peer name host20
          ip link set access20 master br0
          bridge vlan add dev access20 vid 20 pvid untagged
          ip link set access20 up
          ip netns add host20
          ip link set host20 netns host20
          ip netns exec host20 ip link set lo up
          ip netns exec host20 ip link set host20 name eth0
          ip netns exec host20 ip link set eth0 address 02:00:00:00:82:22
          ip netns exec host20 ip addr add 10.20.82.12/24 dev eth0
          ip netns exec host20 ip link set eth0 up
      - kind: vtysh
        run: |
          configure terminal
          hostname pe2
          router bgp 65000
           bgp router-id 10.255.82.12
           no bgp default ipv4-unicast
           neighbor 10.0.82.3 remote-as 65000
           address-family ipv4 unicast
            network 10.255.82.12/32
            neighbor 10.0.82.3 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.82.3 activate
            advertise-all-vni
           exit-address-family
          end

links:
  - name: rr-pe1
    type: p2p
    members:
      - { router: pe1, ifname: eth1, ipv4: 10.0.82.0/31 }
      - { router: rr, ifname: eth1, ipv4: 10.0.82.1/31 }

  - name: rr-pe2
    type: p2p
    members:
      - { router: pe2, ifname: eth1, ipv4: 10.0.82.2/31 }
      - { router: rr, ifname: eth2, ipv4: 10.0.82.3/31 }

pings:
  - name: pe1-vlan10-host-to-pe2-vlan10-host
    from:
      router: pe1
      namespace: host10
      address: 10.10.82.11
    to: 10.10.82.12

  - name: pe1-vlan20-host-to-pe2-vlan20-host
    from:
      router: pe1
      namespace: host20
      address: 10.20.82.11
    to: 10.20.82.12
