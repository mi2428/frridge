apiVersion: frridge/v1alpha1

lab:
  name: evpn-type5-simple
  workdir: .frridge

routers:
  rr:
    loopbacks:
      - 10.255.85.100/32
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname rr
          router bgp 65000
           bgp router-id 10.255.85.100
           bgp cluster-id 10.255.85.100
           bgp retain route-target all
           no bgp default ipv4-unicast
           neighbor 10.0.85.0 remote-as 65000
           neighbor 10.0.85.2 remote-as 65000
           address-family ipv4 unicast
            network 10.255.85.100/32
            neighbor 10.0.85.0 activate
            neighbor 10.0.85.0 route-reflector-client
            neighbor 10.0.85.0 next-hop-self force
            neighbor 10.0.85.2 activate
            neighbor 10.0.85.2 route-reflector-client
            neighbor 10.0.85.2 next-hop-self force
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.85.0 activate
            neighbor 10.0.85.0 route-reflector-client
            neighbor 10.0.85.2 activate
            neighbor 10.0.85.2 route-reflector-client
           exit-address-family
          end

  pe1:
    loopbacks:
      - 10.255.85.11/32
    linux:
      vrfs:
        - name: tenant
          table: 1100
      bridges:
        - name: br5000
          master: tenant
          mac: 02:00:00:00:85:51
          addrgenmode: none
          vxlans:
            - name: vxlan5000
              vni: 5000
              local: 10.255.85.11
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                neighSuppress: true
                learning: false
      veths:
        - name: lan0
          peer: host0
          master: tenant
          addresses: [10.10.85.1/24]
          namespace:
            name: host
            ifname: eth0
            addresses: [10.10.85.11/24]
            defaultVia: 10.10.85.1
    commands:
      - kind: vtysh
        run: |
          configure terminal
          vrf tenant
           vni 5000
          exit-vrf
          hostname pe1
          router bgp 65000
           bgp router-id 10.255.85.11
           no bgp default ipv4-unicast
           neighbor 10.0.85.1 remote-as 65000
           address-family ipv4 unicast
            network 10.255.85.11/32
            neighbor 10.0.85.1 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.85.1 activate
           exit-address-family
          exit
          router bgp 65000 vrf tenant
           bgp router-id 10.255.85.11
           address-family ipv4 unicast
            redistribute connected
           exit-address-family
           address-family l2vpn evpn
            advertise ipv4 unicast
           exit-address-family
          end

  pe2:
    loopbacks:
      - 10.255.85.12/32
    linux:
      vrfs:
        - name: tenant
          table: 1200
      bridges:
        - name: br5000
          master: tenant
          mac: 02:00:00:00:85:52
          addrgenmode: none
          vxlans:
            - name: vxlan5000
              vni: 5000
              local: 10.255.85.12
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                neighSuppress: true
                learning: false
      veths:
        - name: lan0
          peer: host0
          master: tenant
          addresses: [10.20.85.1/24]
          namespace:
            name: host
            ifname: eth0
            addresses: [10.20.85.11/24]
            defaultVia: 10.20.85.1
    commands:
      - kind: vtysh
        run: |
          configure terminal
          vrf tenant
           vni 5000
          exit-vrf
          hostname pe2
          router bgp 65000
           bgp router-id 10.255.85.12
           no bgp default ipv4-unicast
           neighbor 10.0.85.3 remote-as 65000
           address-family ipv4 unicast
            network 10.255.85.12/32
            neighbor 10.0.85.3 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.85.3 activate
           exit-address-family
          exit
          router bgp 65000 vrf tenant
           bgp router-id 10.255.85.12
           address-family ipv4 unicast
            redistribute connected
           exit-address-family
           address-family l2vpn evpn
            advertise ipv4 unicast
           exit-address-family
          end

links:
  - name: rr-pe1
    type: p2p
    members:
      - router: pe1
        ifname: eth1
        ipv4: 10.0.85.0/31
      - router: rr
        ifname: eth1
        ipv4: 10.0.85.1/31

  - name: rr-pe2
    type: p2p
    members:
      - router: pe2
        ifname: eth1
        ipv4: 10.0.85.2/31
      - router: rr
        ifname: eth2
        ipv4: 10.0.85.3/31

pings:
  - name: pe1-host-to-pe2-host
    from:
      router: pe1
      namespace: host
      address: 10.10.85.11
    to: 10.20.85.11
