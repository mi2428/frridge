apiVersion: frridge/v1alpha1

lab:
  name: ebgp-inter-as-b
  workdir: .frridge

routers:
  as1:
    loopbacks:
      - 10.255.1.1/32
    linux:
      bridges:
        - name: br10
          addresses: [10.10.20.1/24]
          namespaces:
            - name: host
              ifname: eth0
              mac: 02:00:00:00:b0:11
              addresses: [10.10.20.11/24]
              defaultVia: 10.10.20.1
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname as1
          router bgp 65001
           bgp router-id 10.255.1.1
           neighbor 192.0.2.1 remote-as 65002
           address-family ipv4 unicast
            network 10.255.1.1/32
            network 10.10.20.0/24
            neighbor 192.0.2.1 activate
           exit-address-family
          end

  as2:
    loopbacks:
      - 10.255.1.2/32
    linux:
      bridges:
        - name: br20
          addresses: [10.20.20.1/24]
          namespaces:
            - name: host
              ifname: eth0
              mac: 02:00:00:00:b0:12
              addresses: [10.20.20.12/24]
              defaultVia: 10.20.20.1
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname as2
          router bgp 65002
           bgp router-id 10.255.1.2
           neighbor 192.0.2.0 remote-as 65001
           address-family ipv4 unicast
            network 10.255.1.2/32
            network 10.20.20.0/24
            neighbor 192.0.2.0 activate
           exit-address-family
          end

links:
  - name: border-ip
    type: p2p
    members:
      - router: as1
        ifname: eth1
        ipv4: 192.0.2.0/31
      - router: as2
        ifname: eth1
        ipv4: 192.0.2.1/31

pings:
  - name: as1-host-to-as2-host
    from:
      router: as1
      namespace: host
    to: 10.20.20.12
