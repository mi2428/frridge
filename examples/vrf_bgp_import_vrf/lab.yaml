apiVersion: frridge/v1alpha1

lab:
  name: vrf-bgp-import-vrf
  workdir: .frridge

routers:
  rt1:
    loopbacks:
      - 10.255.97.1/32
    linux:
      vrfs:
        - name: blue
          table: 1101
        - name: red
          table: 1102
      veths:
        - name: blue0
          peer: blue-host0
          master: blue
          addresses: [10.10.97.1/24]
          namespace:
            name: blue-host
            ifname: eth0
            addresses: [10.10.97.11/24]
            defaultVia: 10.10.97.1
        - name: red0
          peer: red-host0
          master: red
          addresses: [10.20.97.1/24]
          namespace:
            name: red-host
            ifname: eth0
            addresses: [10.20.97.11/24]
            defaultVia: 10.20.97.1
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname rt1
          router bgp 65000
           bgp router-id 10.255.97.1
          exit
          router bgp 65000 vrf blue
           bgp router-id 10.255.97.1
           address-family ipv4 unicast
            redistribute connected
            import vrf red
           exit-address-family
          exit
          router bgp 65000 vrf red
           bgp router-id 10.255.97.1
           address-family ipv4 unicast
            redistribute connected
            import vrf blue
           exit-address-family
          end

pings:
  - name: blue-host-to-red-host
    from:
      router: rt1
      namespace: blue-host
      address: 10.10.97.11
    to: 10.20.97.11
