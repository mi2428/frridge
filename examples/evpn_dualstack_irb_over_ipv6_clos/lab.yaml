    command: ["sh", "-lc", "sleep infinity"]
    commands:
      - kind: shell
        run: |
          set -e
          ip link set lo up
          ip -6 addr replace 2001:db8:196:40::13/64 dev eth1
          ip route replace default via 10.10.80.1
          ip -6 route replace default via 2001:db8:196:40::1
          ping -c 1 -W 1 10.10.80.1 >/dev/null 2>&1 || true
          ping -c 1 -W 1 2001:db8:196:40::1 >/dev/null 2>&1 || true
      - kind: shell
        run: |
          set -e
          sleep 10

links:
  - name: lf1-sp1
    type: p2p
    members:
      - { router: lf1, ifname: eth1 }
      - { router: sp1, ifname: eth1 }

  - name: lf2-sp1
    type: p2p
    members:
      - { router: lf2, ifname: eth1 }
      - { router: sp1, ifname: eth2 }

  - name: lf3-sp1
    type: p2p
    members:
      - { router: lf3, ifname: eth1 }
      - { router: sp1, ifname: eth3 }

  - name: lf1-sp2
    type: p2p
    members:
      - { router: lf1, ifname: eth2 }
      - { router: sp2, ifname: eth1 }

  - name: lf2-sp2
    type: p2p
    members:
      - { router: lf2, ifname: eth2 }
      - { router: sp2, ifname: eth2 }

  - name: lf3-sp2
    type: p2p
    members:
      - { router: lf3, ifname: eth2 }
      - { router: sp2, ifname: eth3 }

  - name: lf1-students
    type: bridge
    members:
      - { router: lf1, ifname: eth3 }
      - { router: student11, ifname: eth1, ipv4: 10.10.50.11/24, mac: 02:00:00:10:50:11 }

  - name: lf2-students
    type: bridge
    members:
      - { router: lf2, ifname: eth3 }
      - { router: student21, ifname: eth1, ipv4: 10.10.50.12/24, mac: 02:00:00:10:50:12 }

  - name: lf3-students
    type: bridge
    members:
      - { router: lf3, ifname: eth3 }
      - { router: student31, ifname: eth1, ipv4: 10.10.50.13/24, mac: 02:00:00:10:50:13 }

  - name: lf1-services
    type: bridge
    members:
      - { router: lf1, ifname: eth4 }
      - { router: svc11, ifname: eth1, ipv4: 10.10.60.11/24, mac: 02:00:00:10:60:11 }

  - name: lf2-services
    type: bridge
    members:
      - { router: lf2, ifname: eth4 }
      - { router: svc21, ifname: eth1, ipv4: 10.10.70.12/24, mac: 02:00:00:10:70:12 }

  - name: lf3-services
    type: bridge
    members:
      - { router: lf3, ifname: eth4 }
      - { router: svc31, ifname: eth1, ipv4: 10.10.80.13/24, mac: 02:00:00:10:80:13 }

pings:
  - name: student11-to-student31-ipv4
    from:
      router: student11
      address: 10.10.50.11
    to: 10.10.50.13

  - name: student11-to-student31-ipv6
    from:
      router: student11
      address: 2001:db8:196:10::11
    to: 2001:db8:196:10::13

  - name: student11-to-svc21-ipv4
    from:
      router: student11
      address: 10.10.50.11
    to: 10.10.70.12

  - name: svc31-to-svc11-ipv6
    from:
      router: svc31
      address: 2001:db8:196:40::13
    to: 2001:db8:196:20::11
