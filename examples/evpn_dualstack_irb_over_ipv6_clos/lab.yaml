apiVersion: frridge/v1alpha1

lab:
  name: evpn-dualstack-irb-ipv6-clos
  workdir: .frridge
  defaults:
    sysctls:
      net.ipv6.conf.all.forwarding: "1"

routers:
  sp1:
    loopbacks:
      - 2001:db8:196::1/128
    commands:
      - kind: shell
        run: |
          set -e
          ip -6 addr replace 2001:db8:196:1::1/127 dev eth1
          ip -6 addr replace 2001:db8:196:2::1/127 dev eth2
          ip -6 addr replace 2001:db8:196:3::1/127 dev eth3
      - kind: vtysh
        run: |
          configure terminal
          hostname sp1
          router bgp 65000
           bgp router-id 10.255.196.1
           bgp cluster-id 10.255.196.1
           bgp retain route-target all
           no bgp default ipv4-unicast
           neighbor 2001:db8:196:1::0 remote-as 65000
           neighbor 2001:db8:196:2::0 remote-as 65000
           neighbor 2001:db8:196:3::0 remote-as 65000
           address-family ipv6 unicast
            network 2001:db8:196::1/128
            neighbor 2001:db8:196:1::0 activate
            neighbor 2001:db8:196:1::0 route-reflector-client
            neighbor 2001:db8:196:1::0 next-hop-self force
            neighbor 2001:db8:196:2::0 activate
            neighbor 2001:db8:196:2::0 route-reflector-client
            neighbor 2001:db8:196:2::0 next-hop-self force
            neighbor 2001:db8:196:3::0 activate
            neighbor 2001:db8:196:3::0 route-reflector-client
            neighbor 2001:db8:196:3::0 next-hop-self force
           exit-address-family
           address-family l2vpn evpn
            neighbor 2001:db8:196:1::0 activate
            neighbor 2001:db8:196:1::0 route-reflector-client
            neighbor 2001:db8:196:2::0 activate
            neighbor 2001:db8:196:2::0 route-reflector-client
            neighbor 2001:db8:196:3::0 activate
            neighbor 2001:db8:196:3::0 route-reflector-client
           exit-address-family
          end

  sp2:
    loopbacks:
      - 2001:db8:196::2/128
    commands:
      - kind: shell
        run: |
          set -e
          ip -6 addr replace 2001:db8:196:4::1/127 dev eth1
          ip -6 addr replace 2001:db8:196:5::1/127 dev eth2
          ip -6 addr replace 2001:db8:196:6::1/127 dev eth3
      - kind: vtysh
        run: |
          configure terminal
          hostname sp2
          router bgp 65000
           bgp router-id 10.255.196.2
           bgp cluster-id 10.255.196.2
           bgp retain route-target all
           no bgp default ipv4-unicast
           neighbor 2001:db8:196:4::0 remote-as 65000
           neighbor 2001:db8:196:5::0 remote-as 65000
           neighbor 2001:db8:196:6::0 remote-as 65000
           address-family ipv6 unicast
            network 2001:db8:196::2/128
            neighbor 2001:db8:196:4::0 activate
            neighbor 2001:db8:196:4::0 route-reflector-client
            neighbor 2001:db8:196:4::0 next-hop-self force
            neighbor 2001:db8:196:5::0 activate
            neighbor 2001:db8:196:5::0 route-reflector-client
            neighbor 2001:db8:196:5::0 next-hop-self force
            neighbor 2001:db8:196:6::0 activate
            neighbor 2001:db8:196:6::0 route-reflector-client
            neighbor 2001:db8:196:6::0 next-hop-self force
           exit-address-family
           address-family l2vpn evpn
            neighbor 2001:db8:196:4::0 activate
            neighbor 2001:db8:196:4::0 route-reflector-client
            neighbor 2001:db8:196:5::0 activate
            neighbor 2001:db8:196:5::0 route-reflector-client
            neighbor 2001:db8:196:6::0 activate
            neighbor 2001:db8:196:6::0 route-reflector-client
           exit-address-family
          end

  lf1:
    loopbacks:
      - 2001:db8:196::11/128
    linux:
      vrfs:
        - name: tenant
          table: 1100
      bridges:
        - name: br5000
          master: tenant
          mac: 02:00:00:96:50:11
          addrgenmode: none
          vxlans:
            - name: vxlan5000
              vni: 5000
              local: 2001:db8:196::11
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                learning: false
                neighSuppress: true
        - name: br10
          master: tenant
          mac: 02:00:00:10:50:01
          addrgenmode: none
          addresses:
            - 10.10.50.1/24
            - 2001:db8:196:10::1/64
          interfaces: [eth3]
          vxlans:
            - name: vxlan100
              vni: 100
              local: 2001:db8:196::11
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                learning: false
                neighSuppress: true
      interfaces:
        - name: eth4
          master: tenant
          addresses:
            - 10.10.60.1/24
            - 2001:db8:196:20::1/64
    commands:
      - kind: shell
        run: |
          set -e
          ip -6 addr replace 2001:db8:196:1::0/127 dev eth1
          ip -6 addr replace 2001:db8:196:4::0/127 dev eth2
          bridge fdb replace 02:00:00:10:50:01 dev br10 self local
      - kind: vtysh
        run: |
          configure terminal
          vrf tenant
           vni 5000
          exit-vrf
          hostname lf1
          router bgp 65000
           bgp router-id 10.255.196.11
           no bgp default ipv4-unicast
           neighbor 2001:db8:196:1::1 remote-as 65000
           neighbor 2001:db8:196:4::1 remote-as 65000
           address-family ipv6 unicast
            network 2001:db8:196::11/128
            neighbor 2001:db8:196:1::1 activate
            neighbor 2001:db8:196:4::1 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 2001:db8:196:1::1 activate
            neighbor 2001:db8:196:4::1 activate
            advertise-all-vni
           exit-address-family
          exit
          ip prefix-list LF1-SERVICE4 permit 10.10.60.0/24
          ipv6 prefix-list LF1-SERVICE6 seq 5 permit 2001:db8:196:20::/64
          route-map LF1-SERVICE4 permit 10
           match ip address prefix-list LF1-SERVICE4
          route-map LF1-SERVICE6 permit 10
           match ipv6 address prefix-list LF1-SERVICE6
          router bgp 65000 vrf tenant
           bgp router-id 10.255.196.11
           address-family ipv4 unicast
            redistribute connected route-map LF1-SERVICE4
           exit-address-family
           address-family ipv6 unicast
            redistribute connected route-map LF1-SERVICE6
           exit-address-family
           address-family l2vpn evpn
            advertise ipv4 unicast
            advertise ipv6 unicast
           exit-address-family
          end

  lf2:
    loopbacks:
      - 2001:db8:196::12/128
    linux:
      vrfs:
        - name: tenant
          table: 1200
      bridges:
        - name: br5000
          master: tenant
          mac: 02:00:00:96:50:12
          addrgenmode: none
          vxlans:
            - name: vxlan5000
              vni: 5000
              local: 2001:db8:196::12
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                learning: false
                neighSuppress: true
        - name: br10
          master: tenant
          mac: 02:00:00:10:50:01
          addrgenmode: none
          addresses:
            - 10.10.50.1/24
            - 2001:db8:196:10::1/64
          interfaces: [eth3]
          vxlans:
            - name: vxlan100
              vni: 100
              local: 2001:db8:196::12
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                learning: false
                neighSuppress: true
      interfaces:
        - name: eth4
          master: tenant
          addresses:
            - 10.10.70.1/24
            - 2001:db8:196:30::1/64
    commands:
      - kind: shell
        run: |
          set -e
          ip -6 addr replace 2001:db8:196:2::0/127 dev eth1
          ip -6 addr replace 2001:db8:196:5::0/127 dev eth2
          bridge fdb replace 02:00:00:10:50:01 dev br10 self local
      - kind: vtysh
        run: |
          configure terminal
          vrf tenant
           vni 5000
          exit-vrf
          hostname lf2
          router bgp 65000
           bgp router-id 10.255.196.12
           no bgp default ipv4-unicast
           neighbor 2001:db8:196:2::1 remote-as 65000
           neighbor 2001:db8:196:5::1 remote-as 65000
           address-family ipv6 unicast
            network 2001:db8:196::12/128
            neighbor 2001:db8:196:2::1 activate
            neighbor 2001:db8:196:5::1 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 2001:db8:196:2::1 activate
            neighbor 2001:db8:196:5::1 activate
            advertise-all-vni
           exit-address-family
          exit
          ip prefix-list LF2-SERVICE4 permit 10.10.70.0/24
          ipv6 prefix-list LF2-SERVICE6 seq 5 permit 2001:db8:196:30::/64
          route-map LF2-SERVICE4 permit 10
           match ip address prefix-list LF2-SERVICE4
          route-map LF2-SERVICE6 permit 10
           match ipv6 address prefix-list LF2-SERVICE6
          router bgp 65000 vrf tenant
           bgp router-id 10.255.196.12
           address-family ipv4 unicast
            redistribute connected route-map LF2-SERVICE4
           exit-address-family
           address-family ipv6 unicast
            redistribute connected route-map LF2-SERVICE6
           exit-address-family
           address-family l2vpn evpn
            advertise ipv4 unicast
            advertise ipv6 unicast
           exit-address-family
          end

  lf3:
    loopbacks:
      - 2001:db8:196::13/128
    linux:
      vrfs:
        - name: tenant
          table: 1300
      bridges:
        - name: br5000
          master: tenant
          mac: 02:00:00:96:50:13
          addrgenmode: none
          vxlans:
            - name: vxlan5000
              vni: 5000
              local: 2001:db8:196::13
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                learning: false
                neighSuppress: true
        - name: br10
          master: tenant
          mac: 02:00:00:10:50:01
          addrgenmode: none
          addresses:
            - 10.10.50.1/24
            - 2001:db8:196:10::1/64
          interfaces: [eth3]
          vxlans:
            - name: vxlan100
              vni: 100
              local: 2001:db8:196::13
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                learning: false
                neighSuppress: true
      interfaces:
        - name: eth4
          master: tenant
          addresses:
            - 10.10.80.1/24
            - 2001:db8:196:40::1/64
    commands:
      - kind: shell
        run: |
          set -e
          ip -6 addr replace 2001:db8:196:3::0/127 dev eth1
          ip -6 addr replace 2001:db8:196:6::0/127 dev eth2
          bridge fdb replace 02:00:00:10:50:01 dev br10 self local
      - kind: vtysh
        run: |
          configure terminal
          vrf tenant
           vni 5000
          exit-vrf
          hostname lf3
          router bgp 65000
           bgp router-id 10.255.196.13
           no bgp default ipv4-unicast
           neighbor 2001:db8:196:3::1 remote-as 65000
           neighbor 2001:db8:196:6::1 remote-as 65000
           address-family ipv6 unicast
            network 2001:db8:196::13/128
            neighbor 2001:db8:196:3::1 activate
            neighbor 2001:db8:196:6::1 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 2001:db8:196:3::1 activate
            neighbor 2001:db8:196:6::1 activate
            advertise-all-vni
           exit-address-family
          exit
          ip prefix-list LF3-SERVICE4 permit 10.10.80.0/24
          ipv6 prefix-list LF3-SERVICE6 seq 5 permit 2001:db8:196:40::/64
          route-map LF3-SERVICE4 permit 10
           match ip address prefix-list LF3-SERVICE4
          route-map LF3-SERVICE6 permit 10
           match ipv6 address prefix-list LF3-SERVICE6
          router bgp 65000 vrf tenant
           bgp router-id 10.255.196.13
           address-family ipv4 unicast
            redistribute connected route-map LF3-SERVICE4
           exit-address-family
           address-family ipv6 unicast
            redistribute connected route-map LF3-SERVICE6
           exit-address-family
           address-family l2vpn evpn
            advertise ipv4 unicast
            advertise ipv6 unicast
           exit-address-family
          end

  student11:
    image: nicolaka/netshoot:latest
    command: ["sh", "-lc", "sleep infinity"]
    commands:
      - kind: shell
        run: |
          set -e
          ip link set lo up
          ip -6 addr replace 2001:db8:196:10::11/64 dev eth1
          ip route replace default via 10.10.50.1
          ip -6 route replace default via 2001:db8:196:10::1
          ping -c 1 -W 1 10.10.50.1 >/dev/null 2>&1 || true
          ping -c 1 -W 1 2001:db8:196:10::1 >/dev/null 2>&1 || true

  student21:
    image: nicolaka/netshoot:latest
    command: ["sh", "-lc", "sleep infinity"]
    commands:
      - kind: shell
        run: |
          set -e
          ip link set lo up
          ip -6 addr replace 2001:db8:196:10::12/64 dev eth1
          ip route replace default via 10.10.50.1
          ip -6 route replace default via 2001:db8:196:10::1
          ping -c 1 -W 1 10.10.50.1 >/dev/null 2>&1 || true
          ping -c 1 -W 1 2001:db8:196:10::1 >/dev/null 2>&1 || true

  student31:
    image: nicolaka/netshoot:latest
    command: ["sh", "-lc", "sleep infinity"]
    commands:
      - kind: shell
        run: |
          set -e
          ip link set lo up
          ip -6 addr replace 2001:db8:196:10::13/64 dev eth1
          ip route replace default via 10.10.50.1
          ip -6 route replace default via 2001:db8:196:10::1
          ping -c 1 -W 1 10.10.50.1 >/dev/null 2>&1 || true
          ping -c 1 -W 1 2001:db8:196:10::1 >/dev/null 2>&1 || true

  svc11:
    image: nicolaka/netshoot:latest
    command: ["sh", "-lc", "sleep infinity"]
    commands:
      - kind: shell
        run: |
          set -e
          ip link set lo up
          ip -6 addr replace 2001:db8:196:20::11/64 dev eth1
          ip route replace default via 10.10.60.1
          ip -6 route replace default via 2001:db8:196:20::1
          ping -c 1 -W 1 10.10.60.1 >/dev/null 2>&1 || true
          ping -c 1 -W 1 2001:db8:196:20::1 >/dev/null 2>&1 || true

  svc21:
