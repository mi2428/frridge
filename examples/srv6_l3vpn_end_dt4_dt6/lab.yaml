apiVersion: frridge/v1alpha1

lab:
  name: srv6-l3vpn-end-dt4-dt6
  workdir: .frridge
  defaults:
    sysctls:
      net.ipv6.conf.all.forwarding: "1"

routers:
  r1:
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.vrf.strict_mode=1
          ip link add vrf10 type vrf table 10
          ip link set vrf10 up
          ip link add vrf20 type vrf table 20
          ip link set vrf20 up
          ip link set eth3 master vrf10
          ip link set eth4 master vrf20
      - kind: vtysh
        run: |
          configure terminal
          interface lo
           ipv6 address 2001:db8:1:1::1/128
          exit
          interface eth1
           ipv6 address 2001:db8:12::1/64
          exit
          interface eth2
           ipv6 address 2001:db8:13::1/64
          exit
          interface eth3
           ip address 192.168.1.254/24
          exit
          interface eth4
           ip address 192.168.1.254/24
          exit
          segment-routing
           srv6
            locators
             locator default
              prefix 2001:db8:1:1::/64
          ipv6 route 2001:db8:2:2::/64 2001:db8:12::2
          ipv6 route 2001:db8:3:3::/64 2001:db8:13::3
          router bgp 65001
           bgp router-id 192.0.2.1
           no bgp ebgp-requires-policy
           no bgp default ipv4-unicast
           neighbor 2001:db8:12::2 remote-as 65002
           neighbor 2001:db8:12::2 capability extended-nexthop
           neighbor 2001:db8:13::3 remote-as 65001
           neighbor 2001:db8:13::3 capability extended-nexthop
           segment-routing srv6
            locator default
           address-family ipv4 vpn
            neighbor 2001:db8:12::2 activate
            neighbor 2001:db8:13::3 activate
           exit-address-family
          exit
          router bgp 65001 vrf vrf10
           bgp router-id 192.0.2.1
           address-family ipv4 unicast
            redistribute connected
            sid vpn export 1
            rd vpn export 65001:10
            rt vpn both 0:10
            import vpn
            export vpn
           exit-address-family
          exit
          router bgp 65001 vrf vrf20
           bgp router-id 192.0.2.1
           address-family ipv4 unicast
            redistribute connected
            sid vpn export 2
            rd vpn export 65001:20
            rt vpn both 0:20
            import vpn
            export vpn
           exit-address-family
          end
          write memory

  r2:
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.vrf.strict_mode=1
          ip link add vrf10 type vrf table 10
          ip link set vrf10 up
          ip link add vrf20 type vrf table 20
          ip link set vrf20 up
          ip link set eth2 master vrf10
          ip link set eth3 master vrf20
      - kind: vtysh
        run: |
          configure terminal
          interface lo
           ipv6 address 2001:db8:2:2::1/128
          exit
          interface eth1
           ipv6 address 2001:db8:12::2/64
          exit
          interface eth2
           ip address 192.168.2.254/24
          exit
          interface eth3
           ip address 192.168.2.254/24
          exit
          segment-routing
           srv6
            locators
             locator default
              prefix 2001:db8:2:2::/64
          ipv6 route 2001:db8:1:1::/64 2001:db8:12::1
          ipv6 route 2001:db8:3:3::/64 2001:db8:12::1
          router bgp 65002
           bgp router-id 192.0.2.2
           no bgp ebgp-requires-policy
           no bgp default ipv4-unicast
           neighbor 2001:db8:12::1 remote-as 65001
           neighbor 2001:db8:12::1 capability extended-nexthop
           segment-routing srv6
            locator default
           address-family ipv4 vpn
            neighbor 2001:db8:12::1 activate
           exit-address-family
          exit
          router bgp 65002 vrf vrf10
           bgp router-id 192.0.2.2
           address-family ipv4 unicast
            redistribute connected
            sid vpn export 1
            rd vpn export 65002:10
            rt vpn both 0:10
            import vpn
            export vpn
           exit-address-family
          exit
          router bgp 65002 vrf vrf20
           bgp router-id 192.0.2.2
           address-family ipv4 unicast
            redistribute connected
            sid vpn export 2
            rd vpn export 65002:20
            rt vpn both 0:20
            import vpn
            export vpn
           exit-address-family
          end
          write memory

  r3:
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.vrf.strict_mode=1
          ip link add vrf10 type vrf table 10
          ip link set vrf10 up
          ip link add vrf20 type vrf table 20
          ip link set vrf20 up
          ip link set eth2 master vrf10
          ip link set eth3 master vrf20
      - kind: vtysh
        run: |
          configure terminal
          interface lo
           ipv6 address 2001:db8:3:3::1/128
          exit
          interface eth1
           ipv6 address 2001:db8:13::3/64
          exit
          interface eth2
           ip address 192.168.3.254/24
          exit
          interface eth3
           ip address 192.168.3.254/24
          exit
          segment-routing
           srv6
            locators
             locator default
              prefix 2001:db8:3:3::/64
          ipv6 route 2001:db8:12::/64 2001:db8:13::1
          ipv6 route 2001:db8:1:1::/64 2001:db8:13::1
          ipv6 route 2001:db8:2:2::/64 2001:db8:13::1
          router bgp 65001
           bgp router-id 192.0.2.3
           no bgp ebgp-requires-policy
           no bgp default ipv4-unicast
           neighbor 2001:db8:13::1 remote-as 65001
           neighbor 2001:db8:13::1 capability extended-nexthop
           segment-routing srv6
            locator default
           address-family ipv4 vpn
            neighbor 2001:db8:13::1 activate
           exit-address-family
          exit
          router bgp 65001 vrf vrf10
           bgp router-id 192.0.2.3
           address-family ipv4 unicast
            redistribute connected
            sid vpn export 1
            rd vpn export 65001:10
            rt vpn both 0:10
            import vpn
            export vpn
           exit-address-family
          exit
          router bgp 65001 vrf vrf20
           bgp router-id 192.0.2.3
           address-family ipv4 unicast
            redistribute connected
            sid vpn export 2
            rd vpn export 65001:20
            rt vpn both 0:20
            import vpn
            export vpn
           exit-address-family
          end
          write memory

  c11:
    commands:
      - kind: vtysh
        run: |
          configure terminal
          interface eth1
           ip address 192.168.1.1/24
           ipv6 address 2001:1::1/64
          exit
          ip route 0.0.0.0/0 192.168.1.254
          ipv6 route ::/0 2001:1::ffff
          end
          write memory

  c12:
    commands:
      - kind: vtysh
        run: |
          configure terminal
          interface eth1
           ip address 192.168.1.1/24
           ipv6 address 2001:1::1/64
          exit
          ip route 0.0.0.0/0 192.168.1.254
          ipv6 route ::/0 2001:1::ffff
          end
          write memory

  c21:
    commands:
      - kind: vtysh
        run: |
          configure terminal
          interface eth1
           ip address 192.168.2.1/24
           ipv6 address 2001:2::1/64
          exit
          ip route 0.0.0.0/0 192.168.2.254
          ipv6 route ::/0 2001:2::ffff
          end
          write memory

  c22:
    commands:
      - kind: vtysh
        run: |
          configure terminal
          interface eth1
           ip address 192.168.2.1/24
           ipv6 address 2001:2::1/64
          exit
          ip route 0.0.0.0/0 192.168.2.254
          ipv6 route ::/0 2001:2::ffff
          end
          write memory

  c31:
    commands:
      - kind: vtysh
        run: |
          configure terminal
          interface eth1
           ip address 192.168.3.1/24
           ipv6 address 2001:3::1/64
          exit
          ip route 0.0.0.0/0 192.168.3.254
          ipv6 route ::/0 2001:3::ffff
          end
          write memory

  c32:
    commands:
      - kind: vtysh
        run: |
          configure terminal
          interface eth1
           ip address 192.168.3.1/24
           ipv6 address 2001:3::1/64
          exit
          ip route 0.0.0.0/0 192.168.3.254
          ipv6 route ::/0 2001:3::ffff
          end
          write memory

links:
  - name: r1-r2
    type: p2p
    members:
      - { router: r1, ifname: eth1 }
      - { router: r2, ifname: eth1 }

  - name: r1-r3
    type: p2p
    members:
      - { router: r1, ifname: eth2 }
      - { router: r3, ifname: eth1 }

  - name: r1-c11
    type: p2p
    members:
      - { router: r1, ifname: eth3 }
      - { router: c11, ifname: eth1 }

  - name: r1-c12
    type: p2p
    members:
      - { router: r1, ifname: eth4 }
      - { router: c12, ifname: eth1 }

  - name: r2-c21
    type: p2p
    members:
      - { router: r2, ifname: eth2 }
      - { router: c21, ifname: eth1 }

  - name: r2-c22
    type: p2p
    members:
      - { router: r2, ifname: eth3 }
      - { router: c22, ifname: eth1 }

  - name: r3-c31
    type: p2p
    members:
      - { router: r3, ifname: eth2 }
      - { router: c31, ifname: eth1 }

  - name: r3-c32
    type: p2p
    members:
      - { router: r3, ifname: eth3 }
      - { router: c32, ifname: eth1 }

pings:
  - name: r1-to-r2-locator
    from:
      router: r1
    to: 2001:db8:2:2::1

  - name: r1-to-r3-locator
    from:
      router: r1
    to: 2001:db8:3:3::1

  - name: r2-to-r3-locator
    from:
      router: r2
    to: 2001:db8:3:3::1
