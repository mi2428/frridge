apiVersion: frridge/v1alpha1

lab:
  name: evpn-type5-srv6-usid-stitching
  workdir: .frridge
  defaults:
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.rp_filter: "0"
      net.ipv4.conf.default.rp_filter: "0"
      net.ipv6.conf.all.forwarding: "1"
      net.ipv6.conf.all.seg6_enabled: "1"
      net.ipv6.conf.default.seg6_enabled: "1"

routers:
  le1:
    loopbacks:
      - 10.255.151.11/32
    linux:
      vrfs:
        - name: tenant
          table: 1510
      bridges:
        - name: br5000
          master: tenant
          mac: 02:00:00:15:50:11
          addrgenmode: none
          vxlans:
            - name: vxlan5000
              vni: 5000
              local: 10.255.151.11
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                neighSuppress: true
                learning: false
      veths:
        - name: lan0
          peer: host0
          master: tenant
          addresses: [10.10.151.1/24]
          namespace:
            name: host
            ifname: eth0
            addresses: [10.10.151.11/24]
            defaultVia: 10.10.151.1
    commands:
      - kind: shell
        run: |
          set -e
          for f in /proc/sys/net/ipv4/conf/*/rp_filter; do
            echo 0 > "$f"
          done
      - kind: vtysh
        run: |
          configure terminal
          vrf tenant
           vni 5000
          exit-vrf
          hostname le1
          router bgp 65010
           bgp router-id 10.255.151.11
           no bgp default ipv4-unicast
           neighbor 10.0.151.1 remote-as 65010
           address-family ipv4 unicast
            network 10.255.151.11/32
            neighbor 10.0.151.1 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.151.1 activate
            advertise-all-vni
           exit-address-family
          exit
          router bgp 65010 vrf tenant
           bgp router-id 10.255.151.11
           address-family ipv4 unicast
            redistribute connected
           exit-address-family
           address-family l2vpn evpn
            advertise ipv4 unicast
           exit-address-family
          end

  gw1:
    loopbacks:
      - 10.255.151.1/32
      - 2001:db8:156:1::1/128
    linux:
      vrfs:
        - name: tenant
          table: 1100
      bridges:
        - name: br5000
          master: tenant
          mac: 02:00:00:15:50:01
          addrgenmode: none
          vxlans:
            - name: vxlan5000
              vni: 5000
              local: 10.255.151.1
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                neighSuppress: true
                learning: false
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.vrf.strict_mode=1
          sysctl -w net.ipv6.conf.eth2.seg6_enabled=1
      - kind: vtysh
        run: |
          configure terminal
          vrf tenant
           vni 5000
          exit-vrf
          hostname gw1
          interface eth2
           ipv6 address 2001:db8:156:12::1/64
          exit
          segment-routing
           srv6
            locators
             locator default
              prefix fcbb:56:1::/48
              behavior usid
              format usid-f3216
          ipv6 route 2001:db8:156:2::1/128 2001:db8:156:12::2
          ipv6 route fcbb:56:2::/48 2001:db8:156:12::2
          router bgp 65010
           bgp router-id 10.255.151.1
           no bgp ebgp-requires-policy
           no bgp default ipv4-unicast
           neighbor 10.0.151.0 remote-as 65010
           neighbor 2001:db8:156:12::2 remote-as 65020
           neighbor 2001:db8:156:12::2 capability extended-nexthop
           segment-routing srv6
            locator default
           address-family ipv4 unicast
            network 10.255.151.1/32
            neighbor 10.0.151.0 activate
           exit-address-family
           address-family ipv4 vpn
            neighbor 2001:db8:156:12::2 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.151.0 activate
            advertise-all-vni
           exit-address-family
          exit
          router bgp 65010 vrf tenant
           bgp router-id 10.255.151.1
           sid vpn per-vrf export auto
           address-family ipv4 unicast
            rd vpn export 65010:5000
            rt vpn both 65000:5000
            import vpn
            export vpn
           exit-address-family
           address-family l2vpn evpn
            advertise ipv4 unicast
           exit-address-family
          end
      - kind: shell
        run: |
          set -e
          for f in /proc/sys/net/ipv4/conf/*/rp_filter; do
            echo 0 > "$f"
          done

  gw2:
    loopbacks:
      - 10.255.152.1/32
      - 2001:db8:156:2::1/128
    linux:
      vrfs:
        - name: tenant
          table: 1200
      bridges:
        - name: br5000
          master: tenant
          mac: 02:00:00:25:50:01
          addrgenmode: none
          vxlans:
            - name: vxlan5000
              vni: 5000
              local: 10.255.152.1
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                neighSuppress: true
                learning: false
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.vrf.strict_mode=1
          sysctl -w net.ipv6.conf.eth2.seg6_enabled=1
      - kind: vtysh
        run: |
          configure terminal
          vrf tenant
           vni 5000
          exit-vrf
          hostname gw2
          interface eth2
           ipv6 address 2001:db8:156:12::2/64
          exit
          segment-routing
           srv6
            locators
             locator default
              prefix fcbb:56:2::/48
              behavior usid
              format usid-f3216
          ipv6 route 2001:db8:156:1::1/128 2001:db8:156:12::1
          ipv6 route fcbb:56:1::/48 2001:db8:156:12::1
          router bgp 65020
           bgp router-id 10.255.152.1
           no bgp ebgp-requires-policy
           no bgp default ipv4-unicast
           neighbor 10.0.152.1 remote-as 65020
           neighbor 2001:db8:156:12::1 remote-as 65010
           neighbor 2001:db8:156:12::1 capability extended-nexthop
           segment-routing srv6
            locator default
           address-family ipv4 unicast
            network 10.255.152.1/32
            neighbor 10.0.152.1 activate
           exit-address-family
           address-family ipv4 vpn
            neighbor 2001:db8:156:12::1 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.152.1 activate
            advertise-all-vni
           exit-address-family
          exit
          router bgp 65020 vrf tenant
           bgp router-id 10.255.152.1
           sid vpn per-vrf export auto
           address-family ipv4 unicast
            rd vpn export 65020:5000
            rt vpn both 65000:5000
            import vpn
            export vpn
           exit-address-family
           address-family l2vpn evpn
            advertise ipv4 unicast
           exit-address-family
          end
      - kind: shell
        run: |
          set -e
          for f in /proc/sys/net/ipv4/conf/*/rp_filter; do
            echo 0 > "$f"
          done

  re1:
    loopbacks:
      - 10.255.152.11/32
    linux:
      vrfs:
        - name: tenant
          table: 1520
      bridges:
        - name: br5000
          master: tenant
          mac: 02:00:00:25:50:11
          addrgenmode: none
          vxlans:
            - name: vxlan5000
              vni: 5000
              local: 10.255.152.11
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                neighSuppress: true
                learning: false
      veths:
        - name: lan0
          peer: host0
          master: tenant
          addresses: [10.20.152.1/24]
          namespace:
            name: host
            ifname: eth0
            addresses: [10.20.152.11/24]
            defaultVia: 10.20.152.1
    commands:
      - kind: shell
        run: |
          set -e
          for f in /proc/sys/net/ipv4/conf/*/rp_filter; do
            echo 0 > "$f"
          done
      - kind: vtysh
        run: |
          configure terminal
          vrf tenant
           vni 5000
          exit-vrf
          hostname re1
          router bgp 65020
           bgp router-id 10.255.152.11
           no bgp default ipv4-unicast
           neighbor 10.0.152.0 remote-as 65020
           address-family ipv4 unicast
            network 10.255.152.11/32
            neighbor 10.0.152.0 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.152.0 activate
            advertise-all-vni
           exit-address-family
          exit
          router bgp 65020 vrf tenant
           bgp router-id 10.255.152.11
           address-family ipv4 unicast
            redistribute connected
           exit-address-family
           address-family l2vpn evpn
            advertise ipv4 unicast
           exit-address-family
          end

links:
  - name: le1-gw1
    type: p2p
    members:
      - router: le1
        ifname: eth1
        ipv4: 10.0.151.0/31
      - router: gw1
        ifname: eth1
        ipv4: 10.0.151.1/31

  - name: gw1-gw2
    type: p2p
    members:
      - router: gw1
        ifname: eth2
      - router: gw2
        ifname: eth2

  - name: gw2-re1
    type: p2p
    members:
      - router: gw2
        ifname: eth1
        ipv4: 10.0.152.0/31
      - router: re1
        ifname: eth1
        ipv4: 10.0.152.1/31

pings:
  - name: left-evpn-edge-loopback
    from:
      router: le1
      address: 10.255.151.11
    to: 10.255.151.1
    count: 2

  - name: right-evpn-edge-loopback
    from:
      router: re1
      address: 10.255.152.11
    to: 10.255.152.1
    count: 2

  - name: srv6-core-link
    from:
      router: gw1
      address: 2001:db8:156:12::1
    to: 2001:db8:156:12::2
    count: 2

  - name: srv6-locator-reachability
    from:
      router: gw1
      address: 2001:db8:156:1::1
    to: 2001:db8:156:2::1
    count: 2

  - name: left-host-to-right-host
    from:
      router: le1
      namespace: host
      address: 10.10.151.11
    to: 10.20.152.11
    count: 2

  - name: right-host-to-left-host
    from:
      router: re1
      namespace: host
      address: 10.20.152.11
    to: 10.10.151.11
    count: 2
