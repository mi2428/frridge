apiVersion: frridge/v1alpha1

lab:
  name: vpnv4-rr-addpath-path-hiding
  workdir: .frridge

routers:
  ingress:
    loopbacks:
      - 10.255.91.11/32
    linux:
      vrfs:
        - name: tenant
          table: 1100
      veths:
        - name: lan0
          peer: host0
          master: tenant
          addresses: [10.10.91.1/24]
          namespace:
            name: host
            ifname: eth0
            addresses: [10.10.91.11/24]
            defaultVia: 10.10.91.1
      routes:
        - to: 10.255.91.100/32
          via: 192.168.91.100
          dev: eth1
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=104857
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
      - kind: vtysh
        run: |
          configure terminal
          hostname ingress
          interface eth1
           mpls bgp forwarding
          exit
          router bgp 65000
           bgp router-id 10.255.91.11
           no bgp ebgp-requires-policy
           no bgp default ipv4-unicast
           neighbor 10.255.91.100 remote-as 65000
           neighbor 10.255.91.100 update-source lo
           neighbor 192.168.91.100 remote-as 65000
           address-family ipv4 unicast
            no neighbor 10.255.91.100 activate
            no neighbor 192.168.91.100 activate
            network 10.255.91.11/32
           exit-address-family
           address-family ipv4 labeled-unicast
            neighbor 192.168.91.100 activate
            network 10.255.91.11/32
           exit-address-family
           address-family ipv4 vpn
            neighbor 10.255.91.100 activate
            neighbor 10.255.91.100 addpath-rx-paths-limit 8
           exit-address-family
          exit
          router bgp 65000 vrf tenant
           bgp router-id 10.255.91.11
           address-family ipv4 unicast
            redistribute connected
            label vpn export 901
            rd vpn export 65000:901
            rt vpn both 65000:91
            import vpn
            export vpn
            maximum-paths ibgp 2
           exit-address-family
          end

  rr:
    loopbacks:
      - 10.255.91.100/32
    linux:
      routes:
        - to: 10.255.91.11/32
          via: 192.168.91.11
          dev: eth1
        - to: 10.255.91.21/32
          via: 192.168.91.21
          dev: eth1
        - to: 10.255.91.22/32
          via: 192.168.91.22
          dev: eth1
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=104857
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
      - kind: vtysh
        run: |
          configure terminal
          hostname rr
          router bgp 65000
           bgp router-id 10.255.91.100
           bgp cluster-id 10.255.91.100
           no bgp ebgp-requires-policy
           no bgp default ipv4-unicast
           neighbor 10.255.91.11 remote-as 65000
           neighbor 10.255.91.11 update-source lo
           neighbor 10.255.91.21 remote-as 65000
           neighbor 10.255.91.21 update-source lo
           neighbor 10.255.91.22 remote-as 65000
           neighbor 10.255.91.22 update-source lo
           neighbor 192.168.91.11 remote-as 65000
           neighbor 192.168.91.21 remote-as 65000
           neighbor 192.168.91.22 remote-as 65000
           address-family ipv4 unicast
            no neighbor 10.255.91.11 activate
            no neighbor 10.255.91.21 activate
            no neighbor 10.255.91.22 activate
            no neighbor 192.168.91.11 activate
            no neighbor 192.168.91.21 activate
            no neighbor 192.168.91.22 activate
            network 10.255.91.100/32
           exit-address-family
           address-family ipv4 labeled-unicast
            neighbor 192.168.91.11 activate
            neighbor 192.168.91.11 route-reflector-client
            neighbor 192.168.91.21 activate
            neighbor 192.168.91.21 route-reflector-client
            neighbor 192.168.91.22 activate
            neighbor 192.168.91.22 route-reflector-client
            network 10.255.91.100/32
           exit-address-family
           address-family ipv4 vpn
            neighbor 10.255.91.11 activate
            neighbor 10.255.91.11 route-reflector-client
            neighbor 10.255.91.11 addpath-tx-all-paths
            neighbor 10.255.91.21 activate
            neighbor 10.255.91.21 route-reflector-client
            neighbor 10.255.91.22 activate
            neighbor 10.255.91.22 route-reflector-client
           exit-address-family
          end

  exit1:
    loopbacks:
      - 10.255.91.21/32
    linux:
      vrfs:
        - name: tenant
          table: 1200
      interfaces:
        - name: eth2
          master: tenant
      routes:
        - to: 10.255.91.100/32
          via: 192.168.91.100
          dev: eth1
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=104857
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
      - kind: vtysh
        run: |
          configure terminal
          hostname exit1
          interface eth1
           mpls bgp forwarding
          exit
          interface eth2
           ip address 10.30.91.1/24
          exit
          router bgp 65000
           bgp router-id 10.255.91.21
           no bgp ebgp-requires-policy
           no bgp default ipv4-unicast
           neighbor 10.255.91.100 remote-as 65000
           neighbor 10.255.91.100 update-source lo
           neighbor 192.168.91.100 remote-as 65000
           address-family ipv4 unicast
            no neighbor 10.255.91.100 activate
            no neighbor 192.168.91.100 activate
            network 10.255.91.21/32
           exit-address-family
           address-family ipv4 labeled-unicast
            neighbor 192.168.91.100 activate
            network 10.255.91.21/32
           exit-address-family
           address-family ipv4 vpn
            neighbor 10.255.91.100 activate
           exit-address-family
          exit
          router bgp 65000 vrf tenant
           bgp router-id 10.255.91.21
           address-family ipv4 unicast
            redistribute connected
            label vpn export 911
            rd vpn export 65000:911
            rt vpn both 65000:91
            import vpn
            export vpn
           exit-address-family
          end

  exit2:
    loopbacks:
      - 10.255.91.22/32
    linux:
      vrfs:
        - name: tenant
          table: 1300
      interfaces:
        - name: eth2
          master: tenant
      routes:
        - to: 10.255.91.100/32
          via: 192.168.91.100
          dev: eth1
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=104857
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
      - kind: vtysh
        run: |
          configure terminal
          hostname exit2
          interface eth1
           mpls bgp forwarding
          exit
          interface eth2
           ip address 10.30.91.2/24
          exit
          router bgp 65000
           bgp router-id 10.255.91.22
           no bgp ebgp-requires-policy
           no bgp default ipv4-unicast
           neighbor 10.255.91.100 remote-as 65000
           neighbor 10.255.91.100 update-source lo
           neighbor 192.168.91.100 remote-as 65000
           address-family ipv4 unicast
            no neighbor 10.255.91.100 activate
            no neighbor 192.168.91.100 activate
            network 10.255.91.22/32
           exit-address-family
           address-family ipv4 labeled-unicast
            neighbor 192.168.91.100 activate
            network 10.255.91.22/32
           exit-address-family
           address-family ipv4 vpn
            neighbor 10.255.91.100 activate
           exit-address-family
          exit
          router bgp 65000 vrf tenant
           bgp router-id 10.255.91.22
           address-family ipv4 unicast
            redistribute connected
            label vpn export 912
            rd vpn export 65000:912
            rt vpn both 65000:91
            import vpn
            export vpn
           exit-address-family
          end

  service:
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname service
          interface eth1
           ip address 10.30.91.33/24
          exit
          ip route 0.0.0.0/0 10.30.91.1
          end

links:
  - name: core
    type: bridge
    members:
      - { router: ingress, ifname: eth1, ipv4: 192.168.91.11/24 }
      - { router: rr, ifname: eth1, ipv4: 192.168.91.100/24 }
      - { router: exit1, ifname: eth1, ipv4: 192.168.91.21/24 }
      - { router: exit2, ifname: eth1, ipv4: 192.168.91.22/24 }

  - name: service-lan
    type: bridge
    members:
      - { router: exit1, ifname: eth2 }
      - { router: exit2, ifname: eth2 }
      - { router: service, ifname: eth1 }

pings:
  - name: ingress-host-to-service-host
    from:
      router: ingress
      namespace: host
      address: 10.10.91.11
    to: 10.30.91.33

  - name: ingress-host-to-exit1-service-gw
    from:
      router: ingress
      namespace: host
      address: 10.10.91.11
    to: 10.30.91.1

  - name: ingress-host-to-exit2-service-gw
    from:
      router: ingress
      namespace: host
      address: 10.10.91.11
    to: 10.30.91.2

  - name: service-host-to-ingress-host
    from:
      router: service
      address: 10.30.91.33
    to: 10.10.91.11
