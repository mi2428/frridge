apiVersion: frridge/v1alpha1

lab:
  name: skeleton-two-routers
  workdir: .frridge
  defaults:
    image: frridge-frr:latest
    privileged: true
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.rp_filter: "0"

routers:
  r1:
    loopbacks:
      - 10.255.10.1/32
  r2:
    loopbacks:
      - 10.255.10.2/32

links:
  - name: r1-r2
    type: p2p
    members:
      - router: r1
        ifname: eth1
        ipv4: 10.0.10.0/31
      - router: r2
        ifname: eth1
        ipv4: 10.0.10.1/31

pings:
  - name: r1-to-r2
    from:
      router: r1
    to: 10.0.10.1
