apiVersion: frridge/v1alpha1

lab:
  name: skeleton-four-ring
  workdir: .frridge

routers:
  r1:
    loopbacks:
      - 10.255.13.1/32
  r2:
    loopbacks:
      - 10.255.13.2/32
  r3:
    loopbacks:
      - 10.255.13.3/32
  r4:
    loopbacks:
      - 10.255.13.4/32

links:
  - name: r1-r2
    type: p2p
    members:
      - router: r1
        ifname: eth1
        ipv4: 10.0.13.0/31
      - router: r2
        ifname: eth1
        ipv4: 10.0.13.1/31

  - name: r2-r3
    type: p2p
    members:
      - router: r2
        ifname: eth2
        ipv4: 10.0.13.2/31
      - router: r3
        ifname: eth1
        ipv4: 10.0.13.3/31

  - name: r3-r4
    type: p2p
    members:
      - router: r3
        ifname: eth2
        ipv4: 10.0.13.4/31
      - router: r4
        ifname: eth1
        ipv4: 10.0.13.5/31

  - name: r4-r1
    type: p2p
    members:
      - router: r4
        ifname: eth2
        ipv4: 10.0.13.6/31
      - router: r1
        ifname: eth2
        ipv4: 10.0.13.7/31

pings:
  - name: r1-to-r2
    from:
      router: r1
    to: 10.0.13.1
  - name: r2-to-r3
    from:
      router: r2
    to: 10.0.13.3
  - name: r3-to-r4
    from:
      router: r3
    to: 10.0.13.5
  - name: r4-to-r1
    from:
      router: r4
    to: 10.0.13.7
