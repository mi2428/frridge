apiVersion: frridge/v1alpha1

lab:
  name: skeleton-four-full-mesh
  workdir: .frridge
  defaults:
    image: frridge-frr:latest
    privileged: true
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.rp_filter: "0"

routers:
  r1:
    loopbacks:
      - 10.255.14.1/32
  r2:
    loopbacks:
      - 10.255.14.2/32
  r3:
    loopbacks:
      - 10.255.14.3/32
  r4:
    loopbacks:
      - 10.255.14.4/32

links:
  - name: r1-r2
    type: p2p
    members:
      - router: r1
        ifname: eth1
        ipv4: 10.0.14.0/31
      - router: r2
        ifname: eth1
        ipv4: 10.0.14.1/31

  - name: r1-r3
    type: p2p
    members:
      - router: r1
        ifname: eth2
        ipv4: 10.0.14.2/31
      - router: r3
        ifname: eth1
        ipv4: 10.0.14.3/31

  - name: r1-r4
    type: p2p
    members:
      - router: r1
        ifname: eth3
        ipv4: 10.0.14.4/31
      - router: r4
        ifname: eth1
        ipv4: 10.0.14.5/31

  - name: r2-r3
    type: p2p
    members:
      - router: r2
        ifname: eth2
        ipv4: 10.0.14.6/31
      - router: r3
        ifname: eth2
        ipv4: 10.0.14.7/31

  - name: r2-r4
    type: p2p
    members:
      - router: r2
        ifname: eth3
        ipv4: 10.0.14.8/31
      - router: r4
        ifname: eth2
        ipv4: 10.0.14.9/31

  - name: r3-r4
    type: p2p
    members:
      - router: r3
        ifname: eth3
        ipv4: 10.0.14.10/31
      - router: r4
        ifname: eth3
        ipv4: 10.0.14.11/31

pings:
  - name: r1-to-r2
    from:
      router: r1
    to: 10.0.14.1
  - name: r1-to-r3
    from:
      router: r1
    to: 10.0.14.3
  - name: r1-to-r4
    from:
      router: r1
    to: 10.0.14.5
  - name: r2-to-r3
    from:
      router: r2
    to: 10.0.14.7
  - name: r2-to-r4
    from:
      router: r2
    to: 10.0.14.9
  - name: r3-to-r4
    from:
      router: r3
    to: 10.0.14.11
