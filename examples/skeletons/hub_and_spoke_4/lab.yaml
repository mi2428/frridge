apiVersion: frridge/v1alpha1

lab:
  name: skeleton-hub-and-spoke-4
  workdir: .frridge

routers:
  hub:
    loopbacks:
      - 10.255.15.1/32
  s1:
    loopbacks:
      - 10.255.15.11/32
  s2:
    loopbacks:
      - 10.255.15.12/32
  s3:
    loopbacks:
      - 10.255.15.13/32

links:
  - name: hub-s1
    type: p2p
    members:
      - router: hub
        ifname: eth1
        ipv4: 10.0.15.0/31
      - router: s1
        ifname: eth1
        ipv4: 10.0.15.1/31

  - name: hub-s2
    type: p2p
    members:
      - router: hub
        ifname: eth2
        ipv4: 10.0.15.2/31
      - router: s2
        ifname: eth1
        ipv4: 10.0.15.3/31

  - name: hub-s3
    type: p2p
    members:
      - router: hub
        ifname: eth3
        ipv4: 10.0.15.4/31
      - router: s3
        ifname: eth1
        ipv4: 10.0.15.5/31

pings:
  - name: hub-to-s1
    from:
      router: hub
    to: 10.0.15.1
  - name: hub-to-s2
    from:
      router: hub
    to: 10.0.15.3
  - name: hub-to-s3
    from:
      router: hub
    to: 10.0.15.5
