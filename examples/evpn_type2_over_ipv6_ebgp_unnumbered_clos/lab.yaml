apiVersion: frridge/v1alpha1

lab:
  name: evpn-type2-ipv6-ebgp-unnumbered-clos
  workdir: .frridge
  defaults:
    sysctls:
      net.ipv6.conf.all.forwarding: "1"

routers:
  sp1:
    loopbacks:
      - 2001:db8:171::1/128
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname sp1
          router bgp 65101
           bgp router-id 10.255.171.1
           no bgp ebgp-requires-policy
           no bgp default ipv4-unicast
           neighbor eth1 interface remote-as external
           neighbor eth2 interface remote-as external
           neighbor eth3 interface remote-as external
           address-family ipv6 unicast
            network 2001:db8:171::1/128
            neighbor eth1 activate
            neighbor eth2 activate
            neighbor eth3 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor eth1 activate
            neighbor eth2 activate
            neighbor eth3 activate
           exit-address-family
          end

  sp2:
    loopbacks:
      - 2001:db8:171::2/128
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname sp2
          router bgp 65102
           bgp router-id 10.255.171.2
           no bgp ebgp-requires-policy
           no bgp default ipv4-unicast
           neighbor eth1 interface remote-as external
           neighbor eth2 interface remote-as external
           neighbor eth3 interface remote-as external
           address-family ipv6 unicast
            network 2001:db8:171::2/128
            neighbor eth1 activate
            neighbor eth2 activate
            neighbor eth3 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor eth1 activate
            neighbor eth2 activate
            neighbor eth3 activate
           exit-address-family
          end

  lf1:
    loopbacks:
      - 2001:db8:171::11/128
    linux:
      bridges:
        - name: br10
          vxlans:
            - name: vxlan100
              vni: 100
              local: 2001:db8:171::11
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                neighSuppress: true
                learning: false
          namespaces:
            - name: host
              ifname: eth0
              mac: 02:00:00:00:71:11
              addresses: [10.10.171.11/24]
    commands:
      - kind: shell
        run: ip netns exec host ping -c 1 -W 1 10.10.171.254 >/dev/null 2>&1 || true
      - kind: vtysh
        run: |
          configure terminal
          hostname lf1
          router bgp 65111
           bgp router-id 10.255.171.11
           no bgp ebgp-requires-policy
           no bgp default ipv4-unicast
           neighbor eth1 interface remote-as external
           neighbor eth2 interface remote-as external
           address-family ipv6 unicast
            network 2001:db8:171::11/128
            neighbor eth1 activate
            neighbor eth2 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor eth1 activate
            neighbor eth2 activate
            advertise-all-vni
           exit-address-family
          end

  lf2:
    loopbacks:
      - 2001:db8:171::12/128
    linux:
      bridges:
        - name: br10
          vxlans:
            - name: vxlan100
              vni: 100
              local: 2001:db8:171::12
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                neighSuppress: true
                learning: false
          namespaces:
            - name: host
              ifname: eth0
              mac: 02:00:00:00:71:12
              addresses: [10.10.171.12/24]
    commands:
      - kind: shell
        run: ip netns exec host ping -c 1 -W 1 10.10.171.254 >/dev/null 2>&1 || true
      - kind: vtysh
        run: |
          configure terminal
          hostname lf2
          router bgp 65112
           bgp router-id 10.255.171.12
           no bgp ebgp-requires-policy
           no bgp default ipv4-unicast
           neighbor eth1 interface remote-as external
           neighbor eth2 interface remote-as external
           address-family ipv6 unicast
            network 2001:db8:171::12/128
            neighbor eth1 activate
            neighbor eth2 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor eth1 activate
            neighbor eth2 activate
            advertise-all-vni
           exit-address-family
          end

  lf3:
    loopbacks:
      - 2001:db8:171::13/128
    linux:
      bridges:
        - name: br10
          vxlans:
            - name: vxlan100
              vni: 100
              local: 2001:db8:171::13
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                neighSuppress: true
                learning: false
          namespaces:
            - name: host
              ifname: eth0
              mac: 02:00:00:00:71:13
              addresses: [10.10.171.13/24]
    commands:
      - kind: shell
        run: ip netns exec host ping -c 1 -W 1 10.10.171.254 >/dev/null 2>&1 || true
      - kind: vtysh
        run: |
          configure terminal
          hostname lf3
          router bgp 65113
           bgp router-id 10.255.171.13
           no bgp ebgp-requires-policy
           no bgp default ipv4-unicast
           neighbor eth1 interface remote-as external
           neighbor eth2 interface remote-as external
           address-family ipv6 unicast
            network 2001:db8:171::13/128
            neighbor eth1 activate
            neighbor eth2 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor eth1 activate
            neighbor eth2 activate
            advertise-all-vni
           exit-address-family
          end

links:
  - name: lf1-sp1
    type: p2p
    members:
      - { router: lf1, ifname: eth1 }
      - { router: sp1, ifname: eth1 }

  - name: lf1-sp2
    type: p2p
    members:
      - { router: lf1, ifname: eth2 }
      - { router: sp2, ifname: eth1 }

  - name: lf2-sp1
    type: p2p
    members:
      - { router: lf2, ifname: eth1 }
      - { router: sp1, ifname: eth2 }

  - name: lf2-sp2
    type: p2p
    members:
      - { router: lf2, ifname: eth2 }
      - { router: sp2, ifname: eth2 }

  - name: lf3-sp1
    type: p2p
    members:
      - { router: lf3, ifname: eth1 }
      - { router: sp1, ifname: eth3 }

  - name: lf3-sp2
    type: p2p
    members:
      - { router: lf3, ifname: eth2 }
      - { router: sp2, ifname: eth3 }

pings:
  - name: lf1-host-to-lf2-host
    from:
      router: lf1
      namespace: host
    to: 10.10.171.12

  - name: lf1-host-to-lf3-host
    from:
      router: lf1
      namespace: host
    to: 10.10.171.13

  - name: lf2-host-to-lf3-host
    from:
      router: lf2
      namespace: host
    to: 10.10.171.13
