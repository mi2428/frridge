apiVersion: frridge/v1alpha1

lab:
  name: sr-mpls-inter-as-stitching
  workdir: .frridge

routers:
  pe1:
    loopbacks:
      - 10.255.161.11/32
    linux:
      veths:
        - name: lan0
          peer: host0
          addresses: [10.10.161.1/24]
          namespace:
            name: host
            ifname: eth0
            addresses: [10.10.161.11/24]
            defaultVia: 10.10.161.1
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=100000
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
          sysctl -w net.mpls.conf.lan0.input=1
          ip route replace 10.255.161.2/32 encap mpls 16102 via inet 10.0.161.1 dev eth1
          ip route replace 10.255.162.12/32 encap mpls 16102 via inet 10.0.161.1 dev eth1
          ip route replace 10.20.162.0/24 encap mpls 16102 via inet 10.0.161.1 dev eth1
      - kind: vtysh
        run: |
          configure terminal
          hostname pe1
          router isis LEFT
           net 49.0001.0000.0000.1611.00
           is-type level-2-only
           metric-style wide
           topology ipv4-unicast
           redistribute ipv4 connected level-2
           segment-routing on
           segment-routing global-block 16000 23999
           segment-routing node-msd 8
           segment-routing prefix 10.255.161.11/32 index 111
          exit
          interface lo
           ip router isis LEFT
           isis passive
          exit
          interface eth1
           ip router isis LEFT
           isis network point-to-point
          exit
          interface lan0
           ip router isis LEFT
           isis passive
          exit
          end

  p1:
    loopbacks:
      - 10.255.161.1/32
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=100000
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
          sysctl -w net.mpls.conf.eth2.input=1
      - kind: vtysh
        run: |
          configure terminal
          hostname p1
          router isis LEFT
           net 49.0001.0000.0000.1612.00
           is-type level-2-only
           metric-style wide
           topology ipv4-unicast
           redistribute ipv4 connected level-2
           segment-routing on
           segment-routing global-block 16000 23999
           segment-routing node-msd 8
           segment-routing prefix 10.255.161.1/32 index 101
          exit
          interface lo
           ip router isis LEFT
           isis passive
          exit
          interface eth1
           ip router isis LEFT
           isis network point-to-point
          exit
          interface eth2
           ip router isis LEFT
           isis network point-to-point
          exit
          end

  asbr1:
    loopbacks:
      - 10.255.161.2/32
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=100000
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
          sysctl -w net.mpls.conf.eth2.input=1
          ip route replace 10.255.161.11/32 encap mpls 16111 via inet 10.0.161.2 dev eth1
          ip route replace 10.10.161.0/24 encap mpls 16111 via inet 10.0.161.2 dev eth1
          ip route replace 10.255.162.12/32 via 192.0.2.1 dev eth2
          ip route replace 10.20.162.0/24 via 192.0.2.1 dev eth2
      - kind: vtysh
        run: |
          configure terminal
          hostname asbr1
          router isis LEFT
           net 49.0001.0000.0000.1613.00
           is-type level-2-only
           metric-style wide
           topology ipv4-unicast
           redistribute ipv4 connected level-2
           segment-routing on
           segment-routing global-block 16000 23999
           segment-routing node-msd 8
           segment-routing prefix 10.255.161.2/32 index 102
          exit
          interface lo
           ip router isis LEFT
           isis passive
          exit
          interface eth1
           ip router isis LEFT
           isis network point-to-point
          exit
          end

  asbr2:
    loopbacks:
      - 10.255.162.2/32
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=100000
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
          sysctl -w net.mpls.conf.eth2.input=1
          ip route replace 10.255.161.11/32 via 192.0.2.0 dev eth1
          ip route replace 10.10.161.0/24 via 192.0.2.0 dev eth1
          ip route replace 10.255.162.12/32 encap mpls 16212 via inet 10.0.162.1 dev eth2
          ip route replace 10.20.162.0/24 encap mpls 16212 via inet 10.0.162.1 dev eth2
      - kind: vtysh
        run: |
          configure terminal
          hostname asbr2
          router isis RIGHT
           net 49.0002.0000.0000.1621.00
           is-type level-2-only
           metric-style wide
           topology ipv4-unicast
           redistribute ipv4 connected level-2
           segment-routing on
           segment-routing global-block 16000 23999
           segment-routing node-msd 8
           segment-routing prefix 10.255.162.2/32 index 202
          exit
          interface lo
           ip router isis RIGHT
           isis passive
          exit
          interface eth2
           ip router isis RIGHT
           isis network point-to-point
          exit
          end

  p2:
    loopbacks:
      - 10.255.162.1/32
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=100000
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
          sysctl -w net.mpls.conf.eth2.input=1
      - kind: vtysh
        run: |
          configure terminal
          hostname p2
          router isis RIGHT
           net 49.0002.0000.0000.1622.00
           is-type level-2-only
           metric-style wide
           topology ipv4-unicast
           redistribute ipv4 connected level-2
           segment-routing on
           segment-routing global-block 16000 23999
           segment-routing node-msd 8
           segment-routing prefix 10.255.162.1/32 index 201
          exit
          interface lo
           ip router isis RIGHT
           isis passive
          exit
          interface eth1
           ip router isis RIGHT
           isis network point-to-point
          exit
          interface eth2
           ip router isis RIGHT
           isis network point-to-point
          exit
          end

  pe2:
    loopbacks:
      - 10.255.162.12/32
    linux:
      veths:
        - name: lan0
          peer: host0
          addresses: [10.20.162.1/24]
          namespace:
            name: host
            ifname: eth0
            addresses: [10.20.162.12/24]
            defaultVia: 10.20.162.1
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=100000
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
          sysctl -w net.mpls.conf.lan0.input=1
          ip route replace 10.255.162.2/32 encap mpls 16202 via inet 10.0.162.2 dev eth1
          ip route replace 10.255.161.11/32 encap mpls 16202 via inet 10.0.162.2 dev eth1
          ip route replace 10.10.161.0/24 encap mpls 16202 via inet 10.0.162.2 dev eth1
      - kind: vtysh
        run: |
          configure terminal
          hostname pe2
          router isis RIGHT
           net 49.0002.0000.0000.1623.00
           is-type level-2-only
           metric-style wide
           topology ipv4-unicast
           redistribute ipv4 connected level-2
           segment-routing on
           segment-routing global-block 16000 23999
           segment-routing node-msd 8
           segment-routing prefix 10.255.162.12/32 index 212
          exit
          interface lo
           ip router isis RIGHT
           isis passive
          exit
          interface eth1
           ip router isis RIGHT
           isis network point-to-point
          exit
          interface lan0
           ip router isis RIGHT
           isis passive
          exit
          end
      - kind: shell
        run: |
          set -e
          sleep 20

links:
  - name: pe1-p1
    type: p2p
    members:
      - { router: pe1, ifname: eth1, ipv4: 10.0.161.0/31 }
      - { router: p1, ifname: eth1, ipv4: 10.0.161.1/31 }

  - name: p1-asbr1
    type: p2p
    members:
      - { router: p1, ifname: eth2, ipv4: 10.0.161.2/31 }
      - { router: asbr1, ifname: eth1, ipv4: 10.0.161.3/31 }

  - name: asbr1-asbr2
    type: p2p
    members:
      - { router: asbr1, ifname: eth2, ipv4: 192.0.2.0/31 }
      - { router: asbr2, ifname: eth1, ipv4: 192.0.2.1/31 }

  - name: asbr2-p2
    type: p2p
    members:
      - { router: asbr2, ifname: eth2, ipv4: 10.0.162.0/31 }
      - { router: p2, ifname: eth1, ipv4: 10.0.162.1/31 }

  - name: p2-pe2
    type: p2p
    members:
      - { router: p2, ifname: eth2, ipv4: 10.0.162.2/31 }
      - { router: pe2, ifname: eth1, ipv4: 10.0.162.3/31 }

pings:
  - name: pe1-host-to-pe2-host
    from:
      router: pe1
      namespace: host
      address: 10.10.161.11
    to: 10.20.162.12

  - name: pe2-host-to-pe1-host
    from:
      router: pe2
      namespace: host
      address: 10.20.162.12
    to: 10.10.161.11
