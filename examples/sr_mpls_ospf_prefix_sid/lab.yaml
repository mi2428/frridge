apiVersion: frridge/v1alpha1

lab:
  name: sr-mpls-ospf-prefix-sid
  workdir: .frridge

routers:
  r1:
    loopbacks:
      - 10.255.82.1/32
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=100000
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
          ip route replace 10.255.82.3/32 encap mpls 16203 via inet 10.0.82.1 dev eth1
      - kind: vtysh
        run: |
          configure terminal
          hostname r1
          router ospf
           ospf router-id 10.255.82.1
           capability opaque
           mpls-te on
           mpls-te router-address 10.255.82.1
           mpls-te export
           segment-routing on
           segment-routing global-block 16000 23999
           segment-routing node-msd 8
           segment-routing prefix 10.255.82.1/32 index 201
           network 10.0.82.0/31 area 0.0.0.0
           network 10.255.82.1/32 area 0.0.0.0
          exit
          interface eth1
           ip ospf network point-to-point
           ip ospf capability opaque
          exit
          interface lo
           ip ospf passive
           ip ospf capability opaque
          exit
          end

  r2:
    loopbacks:
      - 10.255.82.2/32
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=100000
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
          sysctl -w net.mpls.conf.eth2.input=1
      - kind: vtysh
        run: |
          configure terminal
          hostname r2
          router ospf
           ospf router-id 10.255.82.2
           capability opaque
           mpls-te on
           mpls-te router-address 10.255.82.2
           mpls-te export
           segment-routing on
           segment-routing global-block 16000 23999
           segment-routing node-msd 8
           segment-routing prefix 10.255.82.2/32 index 202
           network 10.0.82.0/31 area 0.0.0.0
           network 10.0.82.2/31 area 0.0.0.0
           network 10.255.82.2/32 area 0.0.0.0
          exit
          interface eth1
           ip ospf network point-to-point
           ip ospf capability opaque
          exit
          interface eth2
           ip ospf network point-to-point
           ip ospf capability opaque
          exit
          interface lo
           ip ospf passive
           ip ospf capability opaque
          exit
          end

  r3:
    loopbacks:
      - 10.255.82.3/32
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=100000
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
          ip route replace 10.255.82.1/32 encap mpls 16201 via inet 10.0.82.2 dev eth1
      - kind: vtysh
        run: |
          configure terminal
          hostname r3
          router ospf
           ospf router-id 10.255.82.3
           capability opaque
           mpls-te on
           mpls-te router-address 10.255.82.3
           mpls-te export
           segment-routing on
           segment-routing global-block 16000 23999
           segment-routing node-msd 8
           segment-routing prefix 10.255.82.3/32 index 203
           network 10.0.82.2/31 area 0.0.0.0
           network 10.255.82.3/32 area 0.0.0.0
          exit
          interface eth1
           ip ospf network point-to-point
           ip ospf capability opaque
          exit
          interface lo
           ip ospf passive
           ip ospf capability opaque
          exit
          end

links:
  - name: r1-r2
    type: p2p
    members:
      - { router: r1, ifname: eth1, ipv4: 10.0.82.0/31 }
      - { router: r2, ifname: eth1, ipv4: 10.0.82.1/31 }

  - name: r2-r3
    type: p2p
    members:
      - { router: r2, ifname: eth2, ipv4: 10.0.82.2/31 }
      - { router: r3, ifname: eth1, ipv4: 10.0.82.3/31 }

pings:
  - name: r1-to-r3-loopback
    from:
      router: r1
    to: 10.255.82.3
