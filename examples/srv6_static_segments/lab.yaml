apiVersion: frridge/v1alpha1

lab:
  name: srv6-static-segments
  workdir: .frridge
  defaults:
    image: nicolaka/netshoot:latest
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv6.conf.all.forwarding: "1"
      net.ipv4.conf.all.rp_filter: "0"

routers:
  r1:
    command: ["sh", "-lc", "sleep infinity"]
    linux:
      bridges:
        - name: br10
          addresses:
            - 10.10.70.1/24
          namespaces:
            - name: host
              ifname: eth0
              addresses:
                - 10.10.70.11/24
              defaultVia: 10.10.70.1
    commands:
      - kind: shell
        run: |
          set -e
          ip -6 addr replace 2001:db8:12::1/64 dev eth1
          ip link add sr0 type dummy
          ip link set sr0 up
          ip -6 route replace fd00:70:2::/64 via 2001:db8:12::2 dev eth1
          ip -6 route replace fd00:70:3::/64 via 2001:db8:12::2 dev eth1
          ip -6 route replace local fd00:70:1::100/128 encap seg6local action End.DX4 nh4 10.10.70.11 dev sr0
          ip route replace 10.30.70.0/24 encap seg6 mode encap segs fd00:70:2::1,fd00:70:3::100 dev eth1

  r2:
    command: ["sh", "-lc", "sleep infinity"]
    commands:
      - kind: shell
        run: |
          set -e
          ip -6 addr replace 2001:db8:12::2/64 dev eth1
          ip -6 addr replace 2001:db8:23::2/64 dev eth2
          ip link add sr0 type dummy
          ip link set sr0 up
          ip -6 route replace fd00:70:1::/64 via 2001:db8:12::1 dev eth1
          ip -6 route replace fd00:70:3::/64 via 2001:db8:23::3 dev eth2
          ip -6 route replace local fd00:70:2::1/128 encap seg6local action End dev sr0

  r3:
    command: ["sh", "-lc", "sleep infinity"]
    linux:
      bridges:
        - name: br30
          addresses:
            - 10.30.70.1/24
          namespaces:
            - name: host
              ifname: eth0
              addresses:
                - 10.30.70.33/24
              defaultVia: 10.30.70.1
    commands:
      - kind: shell
        run: |
          set -e
          ip -6 addr replace 2001:db8:23::3/64 dev eth1
          ip link add sr0 type dummy
          ip link set sr0 up
          ip -6 route replace fd00:70:1::/64 via 2001:db8:23::2 dev eth1
          ip -6 route replace fd00:70:2::/64 via 2001:db8:23::2 dev eth1
          ip -6 route replace local fd00:70:3::100/128 encap seg6local action End.DX4 nh4 10.30.70.33 dev sr0
          ip route replace 10.10.70.0/24 encap seg6 mode encap segs fd00:70:2::1,fd00:70:1::100 dev eth1

links:
  - name: r1-r2
    type: p2p
    members:
      - { router: r1, ifname: eth1 }
      - { router: r2, ifname: eth1 }

  - name: r2-r3
    type: p2p
    members:
      - { router: r2, ifname: eth2 }
      - { router: r3, ifname: eth1 }

pings:
  - name: r1-host-to-r3-host
    from:
      router: r1
      namespace: host
      address: 10.10.70.11
    to: 10.30.70.33
