apiVersion: frridge/v1alpha1

lab:
  name: evpn-type4-simple
  workdir: .frridge

routers:
  rr:
    loopbacks:
      - 10.255.84.100/32
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname rr
          router bgp 65000
           bgp router-id 10.255.84.100
           bgp cluster-id 10.255.84.100
           bgp retain route-target all
           no bgp default ipv4-unicast
           neighbor 10.0.84.0 remote-as 65000
           neighbor 10.0.84.2 remote-as 65000
           address-family ipv4 unicast
            network 10.255.84.100/32
            neighbor 10.0.84.0 activate
            neighbor 10.0.84.0 route-reflector-client
            neighbor 10.0.84.0 next-hop-self force
            neighbor 10.0.84.2 activate
            neighbor 10.0.84.2 route-reflector-client
            neighbor 10.0.84.2 next-hop-self force
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.84.0 activate
            neighbor 10.0.84.0 route-reflector-client
            neighbor 10.0.84.2 activate
            neighbor 10.0.84.2 route-reflector-client
           exit-address-family
          end

  pe1:
    loopbacks:
      - 10.255.84.11/32
    commands:
      - kind: shell
        run: |
          set -e
          ip link add bond0 type bond mode active-backup
          ip link set eth2 down
          ip link set eth2 master bond0
          ip link set eth2 up
          ip link set bond0 up
          ip link add br10 type bridge
          ip link set br10 up
          ip link add vxlan100 type vxlan id 100 local 10.255.84.11 dstport 4789 nolearning
          ip link set vxlan100 master br10
          ip link set vxlan100 up
          ip link set bond0 master br10
      - kind: vtysh
        run: |
          configure terminal
          hostname pe1
          router bgp 65000
           bgp router-id 10.255.84.11
           no bgp default ipv4-unicast
           neighbor 10.0.84.1 remote-as 65000
           address-family ipv4 unicast
            network 10.255.84.11/32
            neighbor 10.0.84.1 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.84.1 activate
            advertise-all-vni
           exit-address-family
          exit
          interface bond0
           evpn mh es-id 1
           evpn mh es-sys-mac 02:00:00:00:84:aa
           evpn mh es-df-pref 200
          end

  pe2:
    loopbacks:
      - 10.255.84.12/32
    commands:
      - kind: shell
        run: |
          set -e
          ip link add bond0 type bond mode active-backup
          ip link set eth2 down
          ip link set eth2 master bond0
          ip link set eth2 up
          ip link set bond0 up
          ip link add br10 type bridge
          ip link set br10 up
          ip link add vxlan100 type vxlan id 100 local 10.255.84.12 dstport 4789 nolearning
          ip link set vxlan100 master br10
          ip link set vxlan100 up
          ip link set bond0 master br10
      - kind: vtysh
        run: |
          configure terminal
          hostname pe2
          router bgp 65000
           bgp router-id 10.255.84.12
           no bgp default ipv4-unicast
           neighbor 10.0.84.3 remote-as 65000
           address-family ipv4 unicast
            network 10.255.84.12/32
            neighbor 10.0.84.3 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.84.3 activate
            advertise-all-vni
           exit-address-family
          exit
          interface bond0
           evpn mh es-id 1
           evpn mh es-sys-mac 02:00:00:00:84:aa
           evpn mh es-df-pref 100
          end

  srv: {}

links:
  - name: rr-pe1
    type: p2p
    members:
      - router: pe1
        ifname: eth1
        ipv4: 10.0.84.0/31
      - router: rr
        ifname: eth1
        ipv4: 10.0.84.1/31

  - name: rr-pe2
    type: p2p
    members:
      - router: pe2
        ifname: eth1
        ipv4: 10.0.84.2/31
      - router: rr
        ifname: eth2
        ipv4: 10.0.84.3/31

  - name: access
    type: bridge
    members:
      - router: pe1
        ifname: eth2
      - router: pe2
        ifname: eth2
      - router: srv
        ifname: eth1
