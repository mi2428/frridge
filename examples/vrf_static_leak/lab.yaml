apiVersion: frridge/v1alpha1

lab:
  name: vrf-static-leak
  workdir: .frridge

routers:
  rt1:
    loopbacks:
      - 10.255.96.1/32
    linux:
      vrfs:
        - name: blue
          table: 1001
        - name: red
          table: 1002
      veths:
        - name: blue0
          peer: blue-host0
          master: blue
          addresses: [10.10.96.1/24]
          namespace:
            name: blue-host
            ifname: eth0
            addresses: [10.10.96.11/24]
            defaultVia: 10.10.96.1
        - name: red0
          peer: red-host0
          master: red
          addresses: [10.20.96.1/24]
          namespace:
            name: red-host
            ifname: eth0
            addresses: [10.20.96.11/24]
            defaultVia: 10.20.96.1
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname rt1
          vrf blue
           ip route 10.20.96.11/32 10.20.96.11 nexthop-vrf red
          exit-vrf
          vrf red
           ip route 10.10.96.11/32 10.10.96.11 nexthop-vrf blue
          exit-vrf
          end

pings:
  - name: blue-host-to-red-host
    from:
      router: rt1
      namespace: blue-host
      address: 10.10.96.11
    to: 10.20.96.11
