apiVersion: frridge/v1alpha1

lab:
  name: vrf-static-leak
  workdir: .frridge

routers:
  rt1:
    loopbacks:
      - 10.255.96.1/32
    commands:
      - kind: shell
        run: |
          set -e
          ip link add blue type vrf table 1001
          ip link add red type vrf table 1002
          ip link set blue up
          ip link set red up

          ip link add blue0 type veth peer name blue-host0
          ip link set blue0 master blue
          ip addr add 10.10.96.1/24 dev blue0
          ip link set blue0 up
          ip netns add blue-host
          ip link set blue-host0 netns blue-host
          ip netns exec blue-host ip link set lo up
          ip netns exec blue-host ip link set blue-host0 name eth0
          ip netns exec blue-host ip addr add 10.10.96.11/24 dev eth0
          ip netns exec blue-host ip link set eth0 up
          ip netns exec blue-host ip route replace default via 10.10.96.1

          ip link add red0 type veth peer name red-host0
          ip link set red0 master red
          ip addr add 10.20.96.1/24 dev red0
          ip link set red0 up
          ip netns add red-host
          ip link set red-host0 netns red-host
          ip netns exec red-host ip link set lo up
          ip netns exec red-host ip link set red-host0 name eth0
          ip netns exec red-host ip addr add 10.20.96.11/24 dev eth0
          ip netns exec red-host ip link set eth0 up
          ip netns exec red-host ip route replace default via 10.20.96.1
      - kind: vtysh
        run: |
          configure terminal
          hostname rt1
          vrf blue
           ip route 10.20.96.11/32 10.20.96.11 nexthop-vrf red
          exit-vrf
          vrf red
           ip route 10.10.96.11/32 10.10.96.11 nexthop-vrf blue
          exit-vrf
          end

pings:
  - name: blue-host-to-red-host
    from:
      router: rt1
      namespace: blue-host
      address: 10.10.96.11
    to: 10.20.96.11
