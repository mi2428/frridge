apiVersion: frridge/v1alpha1

lab:
  name: evpn-type2-5-campus-access
  workdir: .frridge

routers:
  rr:
    loopbacks:
      - 10.255.95.100/32
    commands:
      - kind: vtysh
        run: |
          configure terminal
          hostname rr
          router bgp 65000
           bgp router-id 10.255.95.100
           bgp cluster-id 10.255.95.100
           bgp retain route-target all
           no bgp default ipv4-unicast
           neighbor 10.0.95.0 remote-as 65000
           neighbor 10.0.95.2 remote-as 65000
           address-family ipv4 unicast
            network 10.255.95.100/32
            neighbor 10.0.95.0 activate
            neighbor 10.0.95.0 route-reflector-client
            neighbor 10.0.95.0 next-hop-self force
            neighbor 10.0.95.2 activate
            neighbor 10.0.95.2 route-reflector-client
            neighbor 10.0.95.2 next-hop-self force
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.95.0 activate
            neighbor 10.0.95.0 route-reflector-client
            neighbor 10.0.95.2 activate
            neighbor 10.0.95.2 route-reflector-client
           exit-address-family
          end

  lf1:
    loopbacks:
      - 10.255.95.11/32
    linux:
      vrfs:
        - name: tenant
          table: 1100
      bridges:
        - name: br5000
          master: tenant
          mac: 02:00:00:95:50:11
          addrgenmode: none
          vxlans:
            - name: vxlan5000
              vni: 5000
              local: 10.255.95.11
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                neighSuppress: true
                learning: false
        - name: br10
          master: tenant
          mac: 02:00:00:10:10:01
          addrgenmode: none
          addresses: [10.10.10.1/24]
          interfaces: [eth2]
          vxlans:
            - name: vxlan100
              vni: 100
              local: 10.255.95.11
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                neighSuppress: true
                learning: false
      interfaces:
        - name: eth3
          master: tenant
          addresses: [10.10.20.1/24]
    commands:
      - kind: shell
        run: |
          set -e
          bridge fdb replace 02:00:00:10:10:01 dev br10 self local
      - kind: vtysh
        run: |
          configure terminal
          vrf tenant
           vni 5000
          exit-vrf
          hostname lf1
          router bgp 65000
           bgp router-id 10.255.95.11
           no bgp default ipv4-unicast
           neighbor 10.0.95.1 remote-as 65000
           address-family ipv4 unicast
            network 10.255.95.11/32
            neighbor 10.0.95.1 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.95.1 activate
            advertise-all-vni
           exit-address-family
          exit
          ip prefix-list CAMPUS-T5 permit 10.10.20.0/24
          route-map CAMPUS-T5 permit 10
           match ip address prefix-list CAMPUS-T5
          router bgp 65000 vrf tenant
           bgp router-id 10.255.95.11
           address-family ipv4 unicast
            redistribute connected route-map CAMPUS-T5
           exit-address-family
           address-family l2vpn evpn
            advertise ipv4 unicast
           exit-address-family
          end

  lf2:
    loopbacks:
      - 10.255.95.12/32
    linux:
      vrfs:
        - name: tenant
          table: 1200
      bridges:
        - name: br5000
          master: tenant
          mac: 02:00:00:95:50:12
          addrgenmode: none
          vxlans:
            - name: vxlan5000
              vni: 5000
              local: 10.255.95.12
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                neighSuppress: true
                learning: false
        - name: br10
          master: tenant
          mac: 02:00:00:10:10:01
          addrgenmode: none
          addresses: [10.10.10.1/24]
          interfaces: [eth2]
          vxlans:
            - name: vxlan100
              vni: 100
              local: 10.255.95.12
              nolearning: true
              addrgenmode: none
              bridgeSlave:
                neighSuppress: true
                learning: false
      interfaces:
        - name: eth3
          master: tenant
          addresses: [10.10.30.1/24]
    commands:
      - kind: shell
        run: |
          set -e
          bridge fdb replace 02:00:00:10:10:01 dev br10 self local
      - kind: vtysh
        run: |
          configure terminal
          vrf tenant
           vni 5000
          exit-vrf
          hostname lf2
          router bgp 65000
           bgp router-id 10.255.95.12
           no bgp default ipv4-unicast
           neighbor 10.0.95.3 remote-as 65000
           address-family ipv4 unicast
            network 10.255.95.12/32
            neighbor 10.0.95.3 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 10.0.95.3 activate
            advertise-all-vni
           exit-address-family
          exit
          ip prefix-list CAMPUS-T5 permit 10.10.30.0/24
          route-map CAMPUS-T5 permit 10
           match ip address prefix-list CAMPUS-T5
          router bgp 65000 vrf tenant
           bgp router-id 10.255.95.12
           address-family ipv4 unicast
            redistribute connected route-map CAMPUS-T5
           exit-address-family
           address-family l2vpn evpn
            advertise ipv4 unicast
           exit-address-family
          end

  student11:
    image: nicolaka/netshoot:latest
    command: ["sh", "-lc", "sleep infinity"]
    commands:
      - kind: shell
        run: |
          set -e
          ip link set lo up
          ip route replace default via 10.10.10.1

  student12:
    image: nicolaka/netshoot:latest
    command: ["sh", "-lc", "sleep infinity"]
    commands:
      - kind: shell
        run: |
          set -e
          ip link set lo up
          ip route replace default via 10.10.10.1

  student21:
    image: nicolaka/netshoot:latest
    command: ["sh", "-lc", "sleep infinity"]
    commands:
      - kind: shell
        run: |
          set -e
          ip link set lo up
          ip route replace default via 10.10.10.1

  student22:
    image: nicolaka/netshoot:latest
    command: ["sh", "-lc", "sleep infinity"]
    commands:
      - kind: shell
        run: |
          set -e
          ip link set lo up
          ip route replace default via 10.10.10.1

  library11:
    image: nicolaka/netshoot:latest
    command: ["sh", "-lc", "sleep infinity"]
    commands:
      - kind: shell
        run: |
          set -e
          ip link set lo up
          ip route replace default via 10.10.20.1

  library12:
    image: nicolaka/netshoot:latest
    command: ["sh", "-lc", "sleep infinity"]
    commands:
      - kind: shell
        run: |
          set -e
          ip link set lo up
          ip route replace default via 10.10.20.1

  dns21:
    image: nicolaka/netshoot:latest
    command: ["sh", "-lc", "sleep infinity"]
    commands:
      - kind: shell
        run: |
          set -e
          ip link set lo up
          ip route replace default via 10.10.30.1

  dns22:
    image: nicolaka/netshoot:latest
    command: ["sh", "-lc", "sleep infinity"]
    commands:
      - kind: shell
        run: |
          set -e
          ip link set lo up
