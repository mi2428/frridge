links:
  - name: rr-lf1
    type: p2p
    members:
      - router: lf1
        ifname: eth1
        ipv4: 10.0.95.0/31
      - router: rr
        ifname: eth1
        ipv4: 10.0.95.1/31

  - name: rr-lf2
    type: p2p
    members:
      - router: lf2
        ifname: eth1
        ipv4: 10.0.95.2/31
      - router: rr
        ifname: eth2
        ipv4: 10.0.95.3/31

  - name: lf1-students
    type: bridge
    members:
      - router: lf1
        ifname: eth2
      - router: student11
        ifname: eth1
        ipv4: 10.10.10.11/24
        mac: 02:00:00:10:10:11
      - router: student12
        ifname: eth1
        ipv4: 10.10.10.12/24
        mac: 02:00:00:10:10:12

  - name: lf2-students
    type: bridge
    members:
      - router: lf2
        ifname: eth2
      - router: student21
        ifname: eth1
        ipv4: 10.10.10.21/24
        mac: 02:00:00:10:10:21
      - router: student22
        ifname: eth1
        ipv4: 10.10.10.22/24
        mac: 02:00:00:10:10:22

  - name: lf1-services
    type: bridge
    members:
      - router: lf1
        ifname: eth3
      - router: library11
        ifname: eth1
        ipv4: 10.10.20.11/24
        mac: 02:00:00:10:20:11
      - router: library12
        ifname: eth1
        ipv4: 10.10.20.12/24
        mac: 02:00:00:10:20:12

  - name: lf2-services
    type: bridge
    members:
      - router: lf2
        ifname: eth3
      - router: dns21
        ifname: eth1
        ipv4: 10.10.30.11/24
        mac: 02:00:00:10:30:11
      - router: dns22
        ifname: eth1
        ipv4: 10.10.30.12/24
        mac: 02:00:00:10:30:12

pings:
  - name: student11-to-student21
    from:
      router: student11
      address: 10.10.10.11
    to: 10.10.10.21

  - name: student11-to-dns21
    from:
      router: student11
      address: 10.10.10.11
    to: 10.10.30.11

  - name: student22-to-library11
    from:
      router: student22
      address: 10.10.10.22
    to: 10.10.20.11

  - name: library12-to-dns22
    from:
      router: library12
      address: 10.10.20.12
    to: 10.10.30.12
