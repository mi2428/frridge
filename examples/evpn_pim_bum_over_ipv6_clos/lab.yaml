      - kind: vtysh
        run: |
          configure terminal
          hostname lf3
          ipv6 pim rp 2001:db8:176::1 ff3e::/16
          interface lo
           ipv6 pim
          exit
          interface eth1
           ipv6 pim
          exit
          interface eth2
           ipv6 pim
          exit
          router bgp 65000
           bgp router-id 10.255.176.13
           no bgp default ipv4-unicast
           neighbor 2001:db8:176:3::1 remote-as 65000
           neighbor 2001:db8:176:6::1 remote-as 65000
           address-family ipv6 unicast
            network 2001:db8:176::13/128
            neighbor 2001:db8:176:3::1 activate
            neighbor 2001:db8:176:6::1 activate
           exit-address-family
           address-family l2vpn evpn
            neighbor 2001:db8:176:3::1 activate
