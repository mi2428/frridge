links:
  - name: lf1-sp1
    type: p2p
    members:
      - { router: lf1, ifname: eth1 }
      - { router: sp1, ifname: eth1 }

  - name: lf2-sp1
    type: p2p
    members:
      - { router: lf2, ifname: eth1 }
      - { router: sp1, ifname: eth2 }

  - name: lf3-sp1
    type: p2p
    members:
      - { router: lf3, ifname: eth1 }
      - { router: sp1, ifname: eth3 }

  - name: lf1-sp2
    type: p2p
    members:
      - { router: lf1, ifname: eth2 }
      - { router: sp2, ifname: eth1 }

  - name: lf2-sp2
    type: p2p
    members:
      - { router: lf2, ifname: eth2 }
      - { router: sp2, ifname: eth2 }

  - name: lf3-sp2
    type: p2p
    members:
      - { router: lf3, ifname: eth2 }
      - { router: sp2, ifname: eth3 }

pings:
  - name: lf1-host-to-lf2-host
    from:
      router: lf1
      namespace: host
    to: 10.10.176.12

  - name: lf1-host-to-lf3-host
    from:
      router: lf1
      namespace: host
    to: 10.10.176.13

  - name: lf2-host-to-lf3-host
    from:
      router: lf2
      namespace: host
    to: 10.10.176.13
