apiVersion: frridge/v1alpha1

lab:
  name: sr-mpls-isis-prefix-sid
  workdir: .frridge

routers:
  r1:
    loopbacks:
      - 10.255.81.1/32
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=100000
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
          ip route replace 10.255.81.3/32 encap mpls 16103 via inet 10.0.81.1 dev eth1
      - kind: vtysh
        run: |
          configure terminal
          hostname r1
          router isis CORE
           net 49.0001.0000.0000.8101.00
           is-type level-2-only
           metric-style wide
           topology ipv4-unicast
           redistribute ipv4 connected level-2
           segment-routing on
           segment-routing global-block 16000 23999
           segment-routing node-msd 8
           segment-routing prefix 10.255.81.1/32 index 101
          exit
          interface lo
           ip router isis CORE
           isis passive
          exit
          interface eth1
           ip router isis CORE
           isis network point-to-point
          exit
          end

  r2:
    loopbacks:
      - 10.255.81.2/32
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=100000
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
          sysctl -w net.mpls.conf.eth2.input=1
      - kind: vtysh
        run: |
          configure terminal
          hostname r2
          router isis CORE
           net 49.0001.0000.0000.8102.00
           is-type level-2-only
           metric-style wide
           topology ipv4-unicast
           redistribute ipv4 connected level-2
           segment-routing on
           segment-routing global-block 16000 23999
           segment-routing node-msd 8
           segment-routing prefix 10.255.81.2/32 index 102
          exit
          interface lo
           ip router isis CORE
           isis passive
          exit
          interface eth1
           ip router isis CORE
           isis network point-to-point
          exit
          interface eth2
           ip router isis CORE
           isis network point-to-point
          exit
          end

  r3:
    loopbacks:
      - 10.255.81.3/32
    commands:
      - kind: shell
        run: |
          set -e
          sysctl -w net.mpls.platform_labels=100000
          sysctl -w net.mpls.conf.lo.input=1
          sysctl -w net.mpls.conf.eth1.input=1
          ip route replace 10.255.81.1/32 encap mpls 16101 via inet 10.0.81.2 dev eth1
      - kind: vtysh
        run: |
          configure terminal
          hostname r3
          router isis CORE
           net 49.0001.0000.0000.8103.00
           is-type level-2-only
           metric-style wide
           topology ipv4-unicast
           redistribute ipv4 connected level-2
           segment-routing on
           segment-routing global-block 16000 23999
           segment-routing node-msd 8
           segment-routing prefix 10.255.81.3/32 index 103
          exit
          interface lo
           ip router isis CORE
           isis passive
          exit
          interface eth1
           ip router isis CORE
           isis network point-to-point
          exit
          end

links:
  - name: r1-r2
    type: p2p
    members:
      - { router: r1, ifname: eth1, ipv4: 10.0.81.0/31 }
      - { router: r2, ifname: eth1, ipv4: 10.0.81.1/31 }

  - name: r2-r3
    type: p2p
    members:
      - { router: r2, ifname: eth2, ipv4: 10.0.81.2/31 }
      - { router: r3, ifname: eth1, ipv4: 10.0.81.3/31 }

pings:
  - name: r1-to-r3-loopback
    from:
      router: r1
    to: 10.255.81.3
